<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE ka ba? - Calamity Watch</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
        :root { --brand-blue: #0A2463; --brand-red: #D83121; --brand-yellow: #FFCB00; --brand-green: #22c55e; --background: #F7F7F7; --text-primary: #1E1E1E; --text-secondary: #6B7280; --border-color: #E5E7EB; }
        body { font-family: 'Rubik', sans-serif; background-color: #E5E7EB; color: var(--text-primary); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overscroll-behavior-y: none; margin: 0; }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 28rem; margin: auto; background-color: var(--background); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); position: relative; overflow: hidden; }
        header { padding: 0.5rem 1rem; background-color: var(--brand-blue); display: flex; justify-content: space-between; align-items: center; z-index: 20; flex-shrink: 0; color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #map { height: 35vh; z-index: 10; background-color: #e2e8f0; }
        #main-content { flex-grow: 1; overflow-y: auto; }
        .alert-item { padding: 1rem; border-radius: 0.75rem; border-left-width: 5px; background-color: white; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.07); }
        footer { display: flex; justify-content: space-around; padding: 0.5rem; background-color: var(--brand-blue); flex-shrink: 0; z-index: 20; color: rgba(255, 255, 255, 0.7); box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1); }
        .footer-btn { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; background: none; border: none; color: inherit; cursor: pointer; padding: 0.25rem; }
        .footer-btn.active { color: var(--brand-yellow); font-weight: 600; }
        .footer-btn span { font-size: 0.75rem; }
        .btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.875rem; border-radius: 0.75rem; font-weight: 600; color: white; transition: transform 0.1s, box-shadow 0.2s; border: none; cursor: pointer; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.15); }
        .btn:hover { transform: translateY(-2px); }
        .btn-red { background: var(--brand-red); }
        .btn-green { background: var(--brand-green); }
        .btn-blue { background-color: #1E40AF; }
        .hidden { display: none !important; }
        #loading-overlay { position: absolute; inset: 0; background-color: rgba(247,247,247,0.8); display:flex; justify-content:center; align-items:center; z-index:50;}
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid var(--brand-yellow); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .modal-overlay { position: absolute; inset: 0; background-color: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.3s ease; }
        .modal-content { background-color: white; padding: 1.5rem; border-radius: 0.75rem; width: calc(100% - 2rem); max-width: 24rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); display: flex; flex-direction: column; gap: 1rem; }
        .modal-slide-up { align-items: flex-end; }
        .modal-slide-up .modal-content { width: 100%; max-width: 100%; border-radius: 0.75rem 0.75rem 0 0; position: absolute; bottom: 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .input-field { box-sizing: border-box; width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading-overlay"><div class="loader"></div></div>
        
        <header>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <img src="/assets/images/bantay-logo.svg" alt="SAFE ka ba? Logo" style="height: 40px; width: auto; flex-shrink: 0;">
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <span id="status-indicator" style="font-size: 0.75rem; font-weight: 600; color: #d1d5db;">● Connecting...</span>
                <i id="settings-btn" data-lucide="settings" style="width: 1.5rem; height: 1.5rem; color: #d1d5db; cursor: pointer;"></i>
            </div>
        </header>

        <div id="main-content">
             <div id="alerts-view">
                <div id="location-denied-banner" class="hidden" style="background-color: var(--brand-yellow); color: var(--text-primary); padding: 0.5rem 1rem; text-align: center; font-size: 0.875rem;">
                    Location access denied. Showing national alerts. <button id="enable-location-banner-btn" style="background:none; border:none; color:var(--brand-blue); text-decoration: underline; cursor: pointer;">Enable</button>
                </div>
                <div id="map"></div>
                <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); border-top: 1px solid var(--border-color); background-color: white;">
                    <h2 id="warnings-title" style="font-weight: 600; font-size: 1.125rem;">Active Warnings</h2>
                    <p id="warnings-subtitle" style="font-size: 0.75rem; color: var(--text-secondary);">Loading alerts...</p>
                </div>
                <main id="alert-list" style="padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;"></main>
            </div>
            <div id="groups-view" class="hidden" style="padding: 1rem; display: flex; flex-direction: column; gap: 1rem;"></div>
            <div id="group-detail-view" class="hidden" style="padding: 1rem; display: flex; flex-direction: column; gap: 1rem;"></div>
        </div>

        <footer>
            <button id="alerts-btn" class="footer-btn active"><i data-lucide="shield-alert"></i><span>Alerts</span></button>
            <button id="groups-btn" class="footer-btn"><i data-lucide="users"></i><span>Groups</span></button>
        </footer>

        <!-- Modals -->
        <div id="location-permission-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div style="text-align: center;"><i data-lucide="map-pin" style="width: 3rem; height: 3rem; color: var(--brand-blue);"></i></div>
                <h3 style="text-align: center; font-size: 1.25rem; font-weight: 700;">Enable Location</h3>
                <p style="text-align: center; color: var(--text-secondary);">To provide relevant, life-saving alerts, "SAFE ka ba?" needs to know your approximate location. We will never share this data.</p>
                <button id="enable-location-modal-btn" class="btn btn-blue">Enable Location</button>
            </div>
        </div>
        <div id="settings-modal" class="modal-overlay modal-slide-up hidden">
            <div class="modal-content">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 1.25rem; font-weight: 700;">Settings</h3>
                    <button id="close-settings-btn" style="background:none; border:none; cursor:pointer;"><i data-lucide="x"></i></button>
                </div>
                <div>
                    <label for="username-input" style="font-size: 0.875rem; font-weight: 500;">Your Name</label>
                    <div style="display: flex; gap: 0.5rem; margin-top: 0.25rem;">
                        <input type="text" id="username-input" class="input-field" placeholder="Enter your name">
                        <button id="save-username-btn" class="btn btn-blue" style="width: auto; padding: 0.75rem 1rem;">Save</button>
                    </div>
                </div>
                <div>
                    <p style="font-size: 0.875rem; font-weight: 500;">Your User ID</p>
                    <p id="user-id-display" style="font-family: monospace; word-break: break-all; background-color: #f1f5f9; padding: 0.5rem; border-radius: 0.5rem; font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;"></p>
                </div>
            </div>
        </div>
        <div id="share-group-modal" class="modal-overlay hidden"></div>
        <div id="confirm-leave-modal" class="modal-overlay hidden"></div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, getDocs, onSnapshot, arrayUnion, arrayRemove, serverTimestamp, orderBy, limit, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        let map, app, auth, db, userId;
        const appId = 'bantay-pwa-live'; 
        let listeners = { userGroups: null, groupMembers: {}, alerts: null, nationalAlerts: null };
        let groupMemberTimers = {};
        const firebaseConfigB64 = "__FIREBASE_CONFIG_B64__";

        document.addEventListener('DOMContentLoaded', () => {
            initializeStaticUI();
            initializeFirebase();
        });

        function initializeStaticUI() {
            lucide.createIcons();
            initializeMap();
            document.getElementById('alerts-btn').addEventListener('click', () => switchView('alerts'));
            document.getElementById('groups-btn').addEventListener('click', () => switchView('groups'));
            document.getElementById('settings-btn').addEventListener('click', openSettingsModal);
            document.getElementById('close-settings-btn').addEventListener('click', () => toggleModal('settings-modal', false));
            document.getElementById('save-username-btn').addEventListener('click', saveUserName);
            document.getElementById('enable-location-modal-btn').addEventListener('click', requestLocationPermission);
            document.getElementById('enable-location-banner-btn').addEventListener('click', requestLocationPermission);
        }

        async function initializeFirebase() {
            if (!firebaseConfigB64 || firebaseConfigB64.startsWith('__')) {
                // ... (offline handling)
                return;
            }
            try {
                const firebaseConfig = JSON.parse(atob(firebaseConfigB64).trim());
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        document.getElementById('status-indicator').textContent = '● Live';
                        document.getElementById('status-indicator').style.color = 'var(--brand-green)';
                        await setupUserDocument(userId);
                        attachUserGroupsListener(userId);
                        
                        // ** DEFINITIVE FIX: Fetch national alerts immediately for instant content **
                        await fetchAndRenderNationalAlerts();
                        document.getElementById('loading-overlay').style.display = 'none';

                        // ** Then, gracefully ask for location permission after the app is loaded **
                        setTimeout(() => {
                            checkAndRequestLocationPermission(); 
                        }, 1500);

                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) { 
                console.error("Firebase Initialization Error:", error);
                document.getElementById('loading-overlay').innerHTML = `<p style="color: red; text-align: center;">Firebase configuration error.<br>Please check deployment plan.</p>`;
            }
        }

        function switchView(viewName) {
            document.getElementById('alerts-view').classList.add('hidden');
            document.getElementById('groups-view').classList.add('hidden');
            document.getElementById('group-detail-view').classList.add('hidden');
            document.getElementById('alerts-btn').classList.remove('active');
            document.getElementById('groups-btn').classList.remove('active');
            
            clearAllListeners('groupMembers');

            if (viewName === 'alerts') {
                document.getElementById('alerts-view').classList.remove('hidden');
                document.getElementById('alerts-btn').classList.add('active');
            } else if (viewName === 'groups') {
                document.getElementById('groups-view').classList.remove('hidden');
                document.getElementById('groups-btn').classList.add('active');
            } else if (viewName === 'group-detail') {
                document.getElementById('group-detail-view').classList.remove('hidden');
                document.getElementById('groups-btn').classList.add('active');
            }
        }

        function toggleModal(modalId, show) {
            const modal = document.getElementById(modalId);
            if (show) {
                modal.classList.remove('hidden');
                lucide.createIcons();
            } else {
                modal.classList.add('hidden');
            }
        }

        async function openSettingsModal() {
            if (!userId) return;
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                document.getElementById('username-input').value = userSnap.data().name || '';
                document.getElementById('user-id-display').textContent = userId;
                toggleModal('settings-modal', true);
            }
        }

        async function saveUserName() {
            if (!userId) return;
            const newName = document.getElementById('username-input').value.trim();
            if (!newName) return;
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
            try {
                await updateDoc(userRef, { name: newName });
                toggleModal('settings-modal', false);
            } catch (error) { console.error("Error updating name:", error); }
        }

        async function checkAndRequestLocationPermission() {
            if (!navigator.geolocation) {
                document.getElementById('warnings-subtitle').textContent = 'Location not supported.';
                return;
            }
            try {
                const permission = await navigator.permissions.query({ name: 'geolocation' });
                if (permission.state === 'granted') {
                    getUserLocation();
                } else if (permission.state === 'prompt') {
                    toggleModal('location-permission-modal', true);
                } else {
                    handleLocationDenied();
                }
            } catch (error) {
                getUserLocation();
            }
        }
        
        function handleLocationDenied() {
            document.getElementById('location-denied-banner').classList.remove('hidden');
        }

        function requestLocationPermission() {
            toggleModal('location-permission-modal', false);
            getUserLocation();
        }

        function getUserLocation() {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('location-denied-banner').classList.add('hidden');
                    // ** UPGRADE to live, local alerts **
                    attachAlertsListener(); 
                },
                () => { handleLocationDenied(); }
            );
        }

        function updateSafetyStatus(newStatus) {
            if (!userId) return;
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
            let updateData = { status: newStatus, lastUpdate: serverTimestamp() };

            if (newStatus === 'Safe') {
                const expirationDate = new Date(Date.now() + 4 * 60 * 60 * 1000);
                updateData.statusExpiresAt = Timestamp.fromDate(expirationDate);
            } else {
                updateData.statusExpiresAt = null;
            }
            updateDoc(userRef, updateData).catch(err => console.error("Error updating status:", err));
        }
        
        function formatTimeRemaining(expiryTimestamp) {
            if (!expiryTimestamp) return '';
            const expiryDate = expiryTimestamp.toDate();
            const totalSeconds = Math.floor((expiryDate - Date.now()) / 1000);
            if (totalSeconds <= 0) return "Expired";
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            return `(expires in ${hours}h ${minutes}m)`;
        }

        async function createGroup() {
            const groupNameInput = prompt("Enter a name for your new group:", "My Family");
            if (!groupNameInput || !groupNameInput.trim()) return;
            const groupName = groupNameInput.trim();
            const code = `${groupName.replace(/\s+/g, '-').toUpperCase()}-${Math.random().toString(36).substr(2, 4)}`;
            try {
                const groupDocRef = await addDoc(collection(db, `artifacts/${appId}/public/data/groups`), { name: groupName, code: code, members: [userId] });
                await updateDoc(doc(db, `artifacts/${appId}/public/data/users`, userId), { groups: arrayUnion(groupDocRef.id) });
                
                const modal = document.getElementById('share-group-modal');
                modal.innerHTML = `
                    <div class="modal-content">
                        <div style="text-align: center;"><i data-lucide="check-circle" style="width: 3rem; height: 3rem; color: var(--brand-green);"></i></div>
                        <h3 style="text-align: center; font-size: 1.25rem; font-weight: 700;">Group Created!</h3>
                        <p style="text-align:center;">Share this code with others to invite them to "${groupName}":</p>
                        <p style="font-family: monospace; background-color: var(--background); padding: 0.75rem; border-radius: 0.5rem; text-align:center; font-size: 1.25rem;">${code}</p>
                        <button id="share-invite-btn" class="btn btn-blue">Share Invite</button>
                        <button id="close-share-modal-btn" class="btn" style="background-color: var(--text-secondary);">Done</button>
                    </div>`;
                document.getElementById('share-invite-btn').onclick = () => shareGroupInvite(code);
                document.getElementById('close-share-modal-btn').onclick = () => toggleModal('share-group-modal', false);
                toggleModal('share-group-modal', true);

            } catch (error) { console.error("Error creating group:", error); }
        }

        function shareGroupInvite(code) {
            const shareData = {
                title: 'SAFE ka ba? Group Invite',
                text: `Join my safety group on SAFE ka ba? Use this code: ${code}`,
            };
            if (navigator.share) {
                navigator.share(shareData);
            } else {
                navigator.clipboard.writeText(shareData.text);
                alert("Invite text copied to clipboard!");
            }
        }

        async function joinGroup() {
            const codeInput = prompt("Enter the group code to join:");
            if (!codeInput || !codeInput.trim()) return;
            const code = codeInput.trim();
            try {
                const q = query(collection(db, `artifacts/${appId}/public/data/groups`), where("code", "==", code));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) return alert("Group not found.");
                const groupDoc = querySnapshot.docs[0];
                await updateDoc(groupDoc.ref, { members: arrayUnion(userId) });
                await updateDoc(doc(db, `artifacts/${appId}/public/data/users`, userId), { groups: arrayUnion(groupDoc.id) });
                alert(`Successfully joined "${groupDoc.data().name}".`);
            } catch (error) { console.error("Error joining group:", error); }
        }

        function confirmLeaveGroup(groupId, groupName) {
            const modal = document.getElementById('confirm-leave-modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="text-align: center; font-size: 1.25rem; font-weight: 700;">Leave Group</h3>
                    <p style="text-align: center; color: var(--text-secondary);">Are you sure you want to leave "${groupName}"? You will no longer see their status updates.</p>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="cancel-leave-btn" class="btn" style="background-color: var(--text-secondary);">Cancel</button>
                        <button id="confirm-leave-btn" class="btn btn-red">Leave</button>
                    </div>
                </div>`;
            document.getElementById('cancel-leave-btn').onclick = () => toggleModal('confirm-leave-modal', false);
            document.getElementById('confirm-leave-btn').onclick = () => executeLeaveGroup(groupId);
            toggleModal('confirm-leave-modal', true);
        }

        async function executeLeaveGroup(groupId) {
            if (!userId || !groupId) return;
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
            const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
            try {
                await updateDoc(userRef, { groups: arrayRemove(groupId) });
                await updateDoc(groupRef, { members: arrayRemove(userId) });
                toggleModal('confirm-leave-modal', false);
                switchView('groups');
            } catch (error) { console.error("Error leaving group:", error); }
        }

        async function fetchAndRenderNationalAlerts() {
            try {
                const nationalAlertsCol = collection(db, `artifacts/${appId}/public/data/national-alerts`);
                const q = query(nationalAlertsCol, orderBy('severity', 'asc'), orderBy('time', 'desc'), limit(5));
                const querySnapshot = await getDocs(q);
                const nationalAlerts = [];
                querySnapshot.forEach((doc) => nationalAlerts.push({ id: doc.id, ...doc.data() }));
                renderAlerts(nationalAlerts, { fallbackType: 'national' });
            } catch (error) {
                console.error("Firestore (national alerts) fetch error:", error);
                renderAlerts([], { fallbackType: 'all-clear' }); // Show all clear if fetch fails
            }
        }

        function attachAlertsListener() {
            if (listeners.alerts) listeners.alerts();
            if (listeners.nationalAlerts) listeners.nationalAlerts();
            listeners.nationalAlerts = null; // Stop any potential national listener

            const alertsCol = collection(db, `artifacts/${appId}/public/data/live-alerts`);
            const q = query(alertsCol, orderBy('time', 'desc'), limit(10));
            listeners.alerts = onSnapshot(q, (querySnapshot) => {
                const alerts = [];
                querySnapshot.forEach((doc) => alerts.push({ id: doc.id, ...doc.data() }));
                renderAlerts(alerts, { fallbackType: 'local' });
            }, (error) => { 
                console.error("Firestore (local alerts) query error:", error);
                handleLocationDenied(); // Fallback to national view if local fails
            });
        }

        function renderAlerts(alerts, options = { fallbackType: 'none' }){
            const container = document.getElementById('alert-list');
            const titleEl = document.getElementById('warnings-title');
            const subtitleEl = document.getElementById('warnings-subtitle');
            container.innerHTML = '';
            
            if (map) map.eachLayer(layer => { if (layer instanceof L.CircleMarker) map.removeLayer(layer); });

            if (options.fallbackType === 'national') {
                titleEl.textContent = "Top National Alerts";
                subtitleEl.textContent = "Most critical warnings across the Philippines right now.";
            } else if (options.fallbackType === 'local') {
                titleEl.textContent = "Active Warnings";
                subtitleEl.textContent = "Based on your current location";
            } else if (options.fallbackType.startsWith('all-clear')) {
                titleEl.textContent = "All Clear";
                subtitleEl.textContent = "No critical alerts reported nationwide.";
                container.innerHTML = `<div style="text-align: center; color: var(--brand-green); padding: 2rem; border-radius: 0.75rem; background-color: white; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.07); display: flex; flex-direction: column; align-items: center;"><i data-lucide="check-circle-2" style="width: 3rem; height: 3rem;"></i><p style="margin-top: 1rem; color: var(--text-primary);">The system is live and no severe threats are active.</p></div>`;
                lucide.createIcons();
                return;
            } else if (options.fallbackType === 'offline') {
                titleEl.textContent = "Offline Mode";
                subtitleEl.textContent = "Connect to the internet for live data.";
                 container.innerHTML = `<div style="text-align: center; color: var(--text-secondary); padding: 2rem; border-radius: 0.75rem; background-color: white; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.07);"><p>Cannot connect to live services.</p></div>`;
            }

            alerts.sort((a,b) => new Date(b.time) - new Date(a.time));
            alerts.forEach(alert => {
                const { severity, title, details, source, time, lat, lon, location } = alert;
                const styles = getAlertStyles(severity);
                const alertEl = document.createElement('div');
                alertEl.className = 'alert-item';
                alertEl.style.borderColor = styles.color;
                alertEl.innerHTML = `<div style="display:flex; align-items:flex-start; gap: 0.75rem;"><div style="width: 1.5rem; height: 1.5rem; color: ${styles.color}; flex-shrink: 0;"><i data-lucide="${styles.icon}"></i></div><div><h3 style="font-weight: 600; color: var(--text-primary);">${title} <span style="color: var(--text-secondary); font-weight: 400;">- ${location}</span></h3><p style="font-size: 0.875rem; color: #475569;">${details}</p><div style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem; display: flex; align-items: center; gap: 1rem;"><span>${source}</span><span>${formatTimeAgo(new Date(time))}</span></div></div></div>`;
                container.appendChild(alertEl);
                
                if (map && lat && lon) {
                    const marker = L.circleMarker([lat, lon], { radius: 8, color: styles.color, fillColor: styles.color, fillOpacity: 0.7 }).addTo(map);
                    marker.bindPopup(`<b>${title}</b><br>${location}`);
                }
            });
            lucide.createIcons();
        }

        async function attachUserGroupsListener(uid) {
            if (listeners.userGroups) listeners.userGroups();
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            listeners.userGroups = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    renderGroupList(docSnap.data().groups || []);
                }
            });
        }

        async function renderGroupList(groupIds) {
            const container = document.getElementById('groups-view');
            let content = `
                <h2 style="font-size: 1.25rem; font-weight: 700;">Your Safety Groups</h2>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <button id="join-group-btn" class="btn btn-red"><i data-lucide="plus-circle"></i><span>Join a Group</span></button>
                    <button id="create-group-btn" class="btn btn-blue"><i data-lucide="users"></i><span>Create a Group</span></button>
                </div>
                <div id="group-list-items" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>`;
            container.innerHTML = content;

            const listContainer = document.getElementById('group-list-items');
            if (groupIds.length === 0) {
                listContainer.innerHTML = `<div style="text-align: center; color: var(--text-secondary); padding: 2rem; border-radius: 0.75rem; background-color: white; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.07);"><p>You haven't joined any groups yet.</p></div>`;
            } else {
                 for (const groupId of groupIds) {
                    const groupSnap = await getDoc(doc(db, `artifacts/${appId}/public/data/groups`, groupId));
                    if (groupSnap.exists()) {
                        const group = groupSnap.data();
                        const el = document.createElement('div');
                        el.style = "padding: 1rem; background-color: white; border-radius: 0.75rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.07);";
                        el.innerHTML = `<div><p style="font-weight: 600;">${group.name}</p><p style="font-size: 0.75rem; color: var(--text-secondary);">${group.members.length} members</p></div><i data-lucide="chevron-right"></i>`;
                        el.onclick = () => { switchView('group-detail'); renderGroupDetail(groupId); }
                        listContainer.appendChild(el);
                    }
                }
            }
            document.getElementById('join-group-btn').addEventListener('click', joinGroup);
            document.getElementById('create-group-btn').addEventListener('click', createGroup);
            lucide.createIcons();
        }

        async function renderGroupDetail(groupId) {
            const container = document.getElementById('group-detail-view');
            container.innerHTML = '<div class="loader"></div>'; // Show loader while fetching details
            
            const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
            const groupSnap = await getDoc(groupRef);
            if (!groupSnap.exists()) return;

            const group = { id: groupSnap.id, ...groupSnap.data() };
            const memberStatuses = {};

            const updateUI = () => {
                let memberHtml = Object.values(memberStatuses).sort((a,b) => (a.name || '').localeCompare(b.name || '')).map(member => {
                    const isCurrentUser = member.id === userId;
                    let status = member.status || 'Unknown';
                    let statusColor = 'var(--text-secondary)';
                    let statusIcon = 'help-circle';
                    let timeText = member.lastUpdate ? formatTimeAgo(member.lastUpdate.toDate()) : 'Never';
                    
                    if (member.status === 'Safe' && member.statusExpiresAt && member.statusExpiresAt.toDate() < new Date()) {
                        status = 'Unknown';
                        timeText = "Status expired";
                    }

                    if (status === 'Safe') {
                        statusColor = 'var(--brand-green)';
                        statusIcon = 'check-circle';
                        timeText = formatTimeRemaining(member.statusExpiresAt);
                    } else if (status === 'Needs Help') {
                        statusColor = 'var(--brand-red)';
                        statusIcon = 'alert-triangle';
                    }

                    return `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; background-color: white; box-shadow: 0 2px 4px 0 rgba(0,0,0,0.05); border-radius: 0.75rem;">
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <i data-lucide="${statusIcon}" style="color: ${statusColor};"></i>
                                <div>
                                    <p style="font-weight: 500;">${member.name} ${isCurrentUser ? '(You)' : ''}</p>
                                    <p style="font-size: 0.75rem; color: var(--text-secondary);" id="timer-${member.id}">${timeText}</p>
                                </div>
                            </div>
                            <span style="font-size: 0.875rem; font-weight: 600; color: ${statusColor};">${status}</span>
                        </div>`;
                }).join('');

                container.innerHTML = `
                    <button id="back-to-groups-btn" style="align-self: flex-start; display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); background: none; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500;"><i data-lucide="arrow-left"></i><span>All Groups</span></button>
                    <h3 style="font-size: 1.25rem; font-weight: 700;">${group.name}</h3>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="safe-btn" class="btn btn-green"><i data-lucide="shield-check"></i><span>I AM SAFE</span></button>
                        <button id="help-btn" class="btn btn-red"><i data-lucide="alert-circle"></i><span>I NEED HELP</span></button>
                    </div>
                    <div id="member-list" style="display: flex; flex-direction: column; gap: 0.5rem;">${memberHtml}</div>
                    <div style="text-align: center; padding: 1rem; margin-top: 1rem; border-top: 1px solid var(--border-color);">
                        <p style="font-size: 0.75rem; color: var(--text-secondary);">Group Code:</p>
                        <p style="font-family: monospace; background-color: #f1f5f9; color: #475569; padding: 0.5rem; border-radius: 0.375rem; margin-top: 0.25rem;">${group.code}</p>
                        <button id="leave-group-btn" style="background:none; border:none; color:var(--brand-red); text-decoration: underline; cursor:pointer; margin-top: 1rem;">Leave Group</button>
                    </div>`;
                
                document.getElementById('back-to-groups-btn').addEventListener('click', () => switchView('groups'));
                document.getElementById('safe-btn').addEventListener('click', () => updateSafetyStatus('Safe'));
                document.getElementById('help-btn').addEventListener('click', () => updateSafetyStatus('Needs Help'));
                document.getElementById('leave-group-btn').addEventListener('click', () => confirmLeaveGroup(group.id, group.name));
                
                lucide.createIcons();
                
                 Object.values(memberStatuses).forEach(member => {
                    if (member.status === 'Safe' && member.statusExpiresAt) {
                        if (groupMemberTimers[member.id]) clearInterval(groupMemberTimers[member.id]);
                        groupMemberTimers[member.id] = setInterval(() => {
                            const timerEl = document.getElementById(`timer-${member.id}`);
                            if (timerEl) {
                                timerEl.textContent = formatTimeRemaining(member.statusExpiresAt);
                                if (timerEl.textContent === "Expired") {
                                    clearInterval(groupMemberTimers[member.id]);
                                }
                            } else {
                                clearInterval(groupMemberTimers[member.id]);
                            }
                        }, 60000);
                    }
                 });
            };

            clearAllListeners('groupMembers');
            group.members.forEach(memberId => {
                const memberRef = doc(db, `artifacts/${appId}/public/data/users`, memberId);
                listeners.groupMembers[memberId] = onSnapshot(memberRef, (docSnap) => {
                    if (docSnap.exists()) {
                        memberStatuses[memberId] = { id: memberId, ...docSnap.data() };
                        updateUI();
                    }
                });
            });
        }

        function clearAllListeners(type) {
            if (type === 'groupMembers') {
                Object.values(listeners.groupMembers).forEach(unsub => unsub());
                listeners.groupMembers = {};
                Object.values(groupMemberTimers).forEach(timer => clearInterval(timer));
                groupMemberTimers = {};
            }
        }

        function initializeMap(){
            map = L.map('map').setView([12.8797, 121.7740], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd', minZoom: 0, maxZoom: 18
            }).addTo(map);
        }
        function getAlertStyles(severity){
            const styles = { Red: { color: 'var(--brand-red)', icon: 'shield-alert' }, Orange: { color: '#f97316', icon: 'siren' }, Yellow: { color: '#eab308', icon: 'alert-triangle' } };
            return styles[severity] || styles.Yellow;
        }
        function formatTimeAgo(date){
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "just now";
            const intervals = { 'year': 31536000, 'month': 2592000, 'day': 86400, 'hour': 3600, 'minute': 60 };
            for (let unit in intervals) {
                let interval = Math.floor(seconds / intervals[unit]);
                if (interval >= 1) { return interval + " " + unit + (interval > 1 ? 's' : '') + " ago"; }
            }
            return "just now";
        }
        async function setupUserDocument(uid){
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                const name = "User " + uid.substring(0, 5);
                await setDoc(userRef, { name: name, status: 'Unknown', lastUpdate: null, groups: [] });
            }
        }

    </script>
</body>
