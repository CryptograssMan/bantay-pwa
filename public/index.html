    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
        :root { --brand-blue: #0A2463; --brand-red: #D83121; --brand-yellow: #FFCB00; --brand-green: #22c55e; --background: #F7F7F7; --text-primary: #1E1E1E; --text-secondary: #6B7280; --border-color: #E5E7EB; }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, getDocs, onSnapshot, arrayUnion, arrayRemove, serverTimestamp, orderBy, limit, Timestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB7WosOnEIYMooRsZowf9Ac4i8_A3sNSQY",
            authDomain: "bantay-pwa.firebaseapp.com",
            projectId: "bantay-pwa",
            storageBucket: "bantay-pwa.appspot.com",
            messagingSenderId: "860293436189",
            appId: "1:860293436189:web:909b94456c6041019d47f4"
        };

        let map, typhoonMap, app, auth, db, userId;
        const appId = 'bantay-pwa-live'; 
        let listeners = { userGroups: null, groupMembers: {}, alerts: null, ratings: null, typhoons: null, advisories: null };
        let typhoonMapLayers = [];
        let groupMemberTimers = {};
        const PERSISTENT_UID_KEY = 'safekaba_persistent_uid';

        document.addEventListener('DOMContentLoaded', () => {
            initializeStaticUI();
            initializeFirebase();
        });

        function initializeStaticUI() {
            lucide.createIcons();
            initializeMap();
            document.getElementById('alerts-btn').addEventListener('click', () => switchView('alerts'));
            document.getElementById('groups-btn').addEventListener('click', () => switchView('groups'));
            document.getElementById('header-faq-btn').addEventListener('click', () => switchView('faq'));
            document.getElementById('enable-location-btn').addEventListener('click', getUserLocation);
            
            document.getElementById('typhoon-tab-btn').addEventListener('click', () => switchAlertView('typhoon'));
            document.getElementById('earthquake-tab-btn').addEventListener('click', () => switchAlertView('earthquake'));

            document.getElementById('feedback-btn').addEventListener('click', () => { document.getElementById('feedback-modal').classList.remove('hidden'); });
            document.getElementById('cancel-feedback-btn').addEventListener('click', () => { document.getElementById('feedback-modal').classList.add('hidden'); });
            document.getElementById('send-feedback-btn').addEventListener('click', sendFeedback);
            
            document.getElementById('dismiss-install-btn').addEventListener('click', () => {
                document.getElementById('install-banner').classList.add('hidden');
                localStorage.setItem('install-banner-dismissed', 'true');
            });
        }

        async function initializeFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const finalUserId = await handleUserSession(user.uid);
                        userId = finalUserId;
                        
                        document.getElementById('status-indicator').textContent = '● Live';
                        document.getElementById('status-indicator').style.color = 'var(--brand-green)';
                        
                        manageInstallBanner();
                        manageFaqNotification();
                        attachUserGroupsListener(userId);
                        attachRatingsListener();
                        
                        if (localStorage.getItem('location-choice-made') === 'denied') {
                             document.getElementById('location-banner').classList.remove('hidden');
                             const subtitle = document.getElementById('warnings-subtitle');
                             subtitle.innerHTML = 'Location access denied. Showing national alerts.';
                             subtitle.style.color = 'var(--brand-red)';
                             attachAlertsListener('national');
                             attachTyphoonListener('national');
                        } else if (localStorage.getItem('location-choice-made') === 'granted') {
                             document.getElementById('location-banner').classList.add('hidden');
                             getUserLocation();
                        } else {
                             document.getElementById('location-banner').classList.remove('hidden');
                             attachAlertsListener('national');
                             attachTyphoonListener('national');
                        }

                        const urlParams = new URLSearchParams(window.location.search);
                        const groupCodeToJoin = urlParams.get('join-group');
                        if (groupCodeToJoin) {
                            await joinGroup(groupCodeToJoin);
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }

                        document.getElementById('loading-overlay').style.display = 'none';
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) { 
                console.error("Firebase Initialization Error:", error);
                document.getElementById('loading-overlay').innerHTML = `<p style="color: red; text-align: center;">Firebase configuration error.<br>Please check deployment plan.</p>`;
            }
        }

        function manageInstallBanner() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            const installBannerDismissed = localStorage.getItem('install-banner-dismissed');
            const installBanner = document.getElementById('install-banner');

            if (!isStandalone && !installBannerDismissed) {
                installBanner.classList.remove('hidden');
                lucide.createIcons();
            }
        }
        
        function manageFaqNotification() {
            const FAQ_UPDATE_KEY = 'faq-update-seen-v10.8'; 
            const faqDot = document.getElementById('faq-notification-dot');
            if (!localStorage.getItem(FAQ_UPDATE_KEY)) {
                faqDot.classList.remove('hidden');
            }
        }

        async function handleUserSession(currentAuthId) {
            const storedId = localStorage.getItem(PERSISTENT_UID_KEY);

            if (!storedId) {
                console.log('First visit. Setting up new user.');
                localStorage.setItem(PERSISTENT_UID_KEY, currentAuthId);
                await setupUserDocument(currentAuthId);
                return currentAuthId;
            }

            if (storedId !== currentAuthId) {
                console.log(`New auth session detected. Old ID: ${storedId}, New ID: ${currentAuthId}`);
                
                const newUserSnap = await getDoc(doc(db, `artifacts/${appId}/public/data/users`, currentAuthId));
                if (newUserSnap.exists() && (newUserSnap.data().groups?.length ?? 0) > 0) {
                       console.log('New user ID already has a document with data. Using it as primary.');
                       localStorage.setItem(PERSISTENT_UID_KEY, currentAuthId);
                       return currentAuthId;
                }
                
                await migrateUserData(storedId, currentAuthId);
                localStorage.setItem(PERSISTENT_UID_KEY, currentAuthId);
                return currentAuthId;
            }
            
            await setupUserDocument(currentAuthId);
            return currentAuthId;
        }
        
        async function migrateUserData(oldId, newId) {
            const oldUserRef = doc(db, `artifacts/${appId}/public/data/users`, oldId);
            const newUserRef = doc(db, `artifacts/${appId}/public/data/users`, newId);
            try {
                const oldUserSnap = await getDoc(oldUserRef);
                if (oldUserSnap.exists()) {
                    const oldData = oldUserSnap.data();
                    await setDoc(newUserRef, oldData);
                    console.log("User data migrated successfully.");
                } else {
                    console.log("Old user document not found, cannot migrate.");
                    await setupUserDocument(newId);
                }
            } catch (error) {
                console.error("Error migrating user data:", error);
            }
        }

        async function setupUserDocument(uid){
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            try {
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    console.log(`Creating new user document for ${uid}`);
                    const name = "User " + uid.substring(0, 5);
                    await setDoc(userRef, { name: name, status: 'Unknown', lastUpdate: null, groups: [] });
                }
            } catch (error) {
                 console.error("Error setting up user document:", error);
            }
        }

        function getUserLocation() {
            if (!navigator.geolocation) { alert("Geolocation is not supported by your browser."); return; }
            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    localStorage.setItem('location-choice-made', 'granted');
                    document.getElementById('location-banner').classList.add('hidden');
                    const subtitle = document.getElementById('warnings-subtitle');
                    subtitle.textContent = "Based on your current location";
                    subtitle.style.color = 'var(--text-secondary)';
                    attachAlertsListener('local'); 
                    attachTyphoonListener('local');
                },
                (error) => {
                    console.error("Geolocation error:", error);
                    const subtitle = document.getElementById('warnings-subtitle');
                    if (error.code === error.PERMISSION_DENIED) {
                        localStorage.setItem('location-choice-made', 'denied');
                        document.getElementById('location-banner').classList.remove('hidden');
                        subtitle.innerHTML = 'Location access denied. Showing national alerts.';
                    } else if (error.code === error.TIMEOUT) {
                        subtitle.textContent = "Location timed out. Showing national alerts.";
                    } else { subtitle.textContent = "Location could not be determined. Showing national alerts."; }
                    subtitle.style.color = 'var(--brand-red)';
                    attachAlertsListener('national');
                    attachTyphoonListener('national');
                },
                options
            );
        }
        
        // --- TYPHOON ALERT LOGIC ---
        const signalColors = { '5': '#D83121', '4': '#f97316', '3': '#eab308', '2': '#3b82f6', '1': '#22c55e' };

        function attachTyphoonListener(type = 'national') {
            if (listeners.typhoons) listeners.typhoons();
            const collName = type === 'local' ? 'local-typhoon-alerts' : 'typhoon-alerts';
            const typhoonRef = collection(db, `artifacts/${appId}/public/data/${collName}`);
            const q = query(typhoonRef, where("isActive", "==", true));

            listeners.typhoons = onSnapshot(q, (snapshot) => {
                const typhoons = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTyphoonList(typhoons, { type });
                updateTyphoonMap(typhoons);
            }, (error) => console.error(`Error fetching ${type} typhoon data:`, error));

            attachWeatherAdvisoryListener();
        }

        function attachWeatherAdvisoryListener() {
            if (listeners.advisories) listeners.advisories();
            const advRef = collection(db, `artifacts/${appId}/public/data/weather-advisories`);
            const q = query(advRef, where("isActive", "==", true));

        function initializeTyphoonMap() {
            if (typhoonMap) return;
            const container = document.getElementById('typhoon-map');
            if (!container) return;
            typhoonMap = L.map('typhoon-map').setView([14.5, 121.0], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd', minZoom: 3, maxZoom: 14
            }).addTo(typhoonMap);
        }

        function updateTyphoonMap(typhoons) {
            if (!typhoonMap) return;
            typhoonMapLayers.forEach(l => typhoonMap.removeLayer(l));
            typhoonMapLayers = [];
            const bounds = [];
            typhoons.forEach(typhoon => {
                const loc = typhoon.currentLocation;
                if (!loc || !loc.lat || !loc.lon) return;
                const highestSignal = Object.keys(typhoon.signalLevels || {}).map(Number).sort((a,b) => b-a).find(s => typhoon.signalLevels[s]?.length > 0) || 0;
                const color = signalColors[highestSignal] || '#6B7280';
                const marker = L.circleMarker([loc.lat, loc.lon], { radius: 14, color: color, fillColor: color, fillOpacity: 0.5, weight: 3 }).addTo(typhoonMap);
                marker.bindPopup(`<b>${typhoon.name}</b>${typhoon.category ? ' (' + typhoon.category + ')' : ''}<br>Signal No. ${highestSignal || 'N/A'}${typhoon.windSpeedKph ? '<br>Winds: ' + typhoon.windSpeedKph + ' km/h' : ''}${typhoon.movementDirection ? '<br>Moving: ' + typhoon.movementDirection : ''}`);
                typhoonMapLayers.push(marker);
                bounds.push([loc.lat, loc.lon]);
                const dot = L.circleMarker([loc.lat, loc.lon], { radius: 5, color: '#fff', fillColor: color, fillOpacity: 1, weight: 2 }).addTo(typhoonMap);
                typhoonMapLayers.push(dot);
                if (typhoon.forecastTrack && typhoon.forecastTrack.length > 0) {
                    const trackPoints = [[loc.lat, loc.lon]];
                    typhoon.forecastTrack.forEach(pt => {
                        if (pt.lat && pt.lon) {
                            trackPoints.push([pt.lat, pt.lon]);
                            bounds.push([pt.lat, pt.lon]);
                            const fMarker = L.circleMarker([pt.lat, pt.lon], { radius: 4, color: color, fillColor: '#fff', fillOpacity: 0.8, weight: 2 }).addTo(typhoonMap);
                            fMarker.bindTooltip(`+${pt.hoursAhead}h`, { permanent: false, direction: 'top' });
                            typhoonMapLayers.push(fMarker);
                        }
                    });
                    const line = L.polyline(trackPoints, { color: color, weight: 2, dashArray: '6,6', opacity: 0.7 }).addTo(typhoonMap);
                    typhoonMapLayers.push(line);
                }
            });
            if (bounds.length > 0) typhoonMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 8 });
        }

        function getHighestSignal(typhoon) {
            return Object.keys(typhoon.signalLevels || {}).map(Number).sort((a,b) => b-a).find(s => typhoon.signalLevels[s]?.length > 0) || 0;
        }

        function attachAlertsListener(type = 'national') {

        async function handleRating(vote) {
            if (localStorage.getItem('app-rated')) return;
            const ratingRef = doc(db, `artifacts/${appId}/public/data/ratings`, 'app-ratings');
            try {
                await updateDoc(ratingRef, { [vote]: increment(1) });
                localStorage.setItem('app-rated', vote);
            } catch (error) {
                if (error.code === 'not-found') {
                    await setDoc(ratingRef, { happy: 0, sad: 0, [vote]: 1 });
                    localStorage.setItem('app-rated', vote);
                } else { console.error("Error submitting rating:", error); }
            }
        }

            if (!/^\S+@\S+\.\S+$/.test(email)) {
                errorEl.textContent = "Please enter a valid email address."; errorEl.style.display = 'block'; return;

            }
            errorEl.style.display = 'none';
            try {
                await addDoc(collection(db, `artifacts/${appId}/public/data/feedback`), {
                    email: email, message: message, timestamp: serverTimestamp()
                });
                alert("Thank you! Your feedback has been sent.");
                emailEl.value = ''; messageEl.value = '';
                document.getElementById('feedback-modal').classList.add('hidden');
            } catch (error) {
                console.error("Error sending feedback:", error);
                errorEl.textContent = "Could not send feedback. Please try again later."; errorEl.style.display = 'block';
            }
        }

        function updateSafetyStatus(newStatus) {
            if (!userId) return;
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
            let updateData = { status: newStatus, lastUpdate: serverTimestamp() };
            if (newStatus === 'Safe') {
                const expirationDate = new Date(Date.now() + 4 * 60 * 60 * 1000);
                updateData.statusExpiresAt = Timestamp.fromDate(expirationDate);
            } else { updateData.statusExpiresAt = null; }
            updateDoc(userRef, updateData).catch(err => console.error("Error updating status:", err));
        }
        function formatTimeRemaining(expiryTimestamp) {
            if (!expiryTimestamp) return '';
            const expiryDate = expiryTimestamp.toDate();
            const totalSeconds = Math.floor((expiryDate - Date.now()) / 1000);
            if (totalSeconds <= 0) return "Expired";
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            return `(expires in ${hours}h ${minutes}m)`;
        }
        async function createGroup() {
            const groupNameInput = prompt("Enter a name for your new group:", "My Family");
            if (!groupNameInput || !groupNameInput.trim()) return;
            const groupName = groupNameInput.trim();
            const code = `${groupName.replace(/\s+/g, '-').toUpperCase()}-${Math.random().toString(36).substr(2, 4)}`;
            try {
                const groupDocRef = await addDoc(collection(db, `artifacts/${appId}/public/data/groups`), { name: groupName, code: code, members: [userId] });
                await updateDoc(doc(db, `artifacts/${appId}/public/data/users`, userId), { groups: arrayUnion(groupDocRef.id) });
                const modal = document.getElementById('share-group-modal');
                modal.innerHTML = `
                    <div class="modal-content">
                        <div style="text-align: center;"><i data-lucide="check-circle" style="width: 3rem; height: 3rem; color: var(--brand-green);"></i></div>
                        <h3 style="text-align: center; font-size: 1.25rem; font-weight: 700;">Group Created!</h3>
                        <p style="text-align:center;">Share this invite link with others:</p>
                        <p style="font-family: monospace; background-color: var(--background); padding: 0.75rem; border-radius: 0.5rem; text-align:center; font-size: 1.25rem; word-break: break-all;">https://app.safekaba.com/?join-group=${code}</p>
                        <button id="share-invite-btn" class="btn btn-blue">Share Invite</button>
                        <button id="close-share-modal-btn" class="btn" style="background-color: var(--text-secondary);">Done</button>
                    </div>`;
                document.getElementById('share-invite-btn').onclick = () => shareGroupInvite(code);
                document.getElementById('close-share-modal-btn').onclick = () => { modal.classList.add('hidden'); };
                modal.classList.remove('hidden');
                lucide.createIcons();
            } catch (error) { console.error("Error creating group:", error); }
        }
        function shareGroupInvite(code) {
            const inviteUrl = `https://app.safekaba.com/?join-group=${code}`;
            const shareData = { title: 'SAFE ka ba? Group Invite', text: `Join my safety group on SAFE ka ba?`, url: inviteUrl };
            if (navigator.share) { navigator.share(shareData); } else { navigator.clipboard.writeText(inviteUrl); alert("Invite link copied to clipboard!"); }
        }
        async function joinGroup(prefilledCode = null) {
            const codeInput = prefilledCode || prompt("Enter the group code to join:");
            if (!codeInput || !codeInput.trim()) return;
            const code = codeInput.trim();
            try {
                const q = query(collection(db, `artifacts/${appId}/public/data/groups`), where("code", "==", code));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) return alert("Group not found.");
                const groupDoc = querySnapshot.docs[0];
                await updateDoc(groupDoc.ref, { members: arrayUnion(userId) });
                await updateDoc(doc(db, `artifacts/${appId}/public/data/users`, userId), { groups: arrayUnion(groupDoc.id) });
                alert(`Successfully joined "${groupDoc.data().name}".`);
                switchView('groups');
            } catch (error) { console.error("Error joining group:", error); }
        }
        function confirmLeaveGroup(groupId, groupName) {
            const modal = document.getElementById('confirm-leave-modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="text-align: center; font-size: 1.25rem; font-weight: 700;">Leave Group</h3>
                    <p style="text-align: center; color: var(--text-secondary);">Are you sure you want to leave "${groupName}"?</p>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="cancel-leave-btn" class="btn" style="background-color: var(--text-secondary);">Cancel</button>
                        <button id="confirm-leave-btn" class="btn btn-red">Leave</button>
                    </div>
                </div>`;
            document.getElementById('cancel-leave-btn').onclick = () => { modal.classList.add('hidden'); };
            document.getElementById('confirm-leave-btn').onclick = () => executeLeaveGroup(groupId);
            modal.classList.remove('hidden');
            lucide.createIcons();
        }
        async function executeLeaveGroup(groupId) {
            if (!userId || !groupId) return;
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
            const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
            try {
                await updateDoc(userRef, { groups: arrayRemove(groupId) });
                await updateDoc(groupRef, { members: arrayRemove(userId) });
                document.getElementById('confirm-leave-modal').classList.add('hidden');
                switchView('groups');
            } catch (error) { console.error("Error leaving group:", error); }
        }
        async function attachUserGroupsListener(uid) {
            if (listeners.userGroups) listeners.userGroups();
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            listeners.userGroups = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    renderGroupList(docSnap.data().groups || []);
                } else {
                    renderGroupList([]);
                }
            });
        }
        async function renderGroupList(groupIds) {
            const container = document.getElementById('groups-view');
            let content = `
                <h2 style="font-size: 1.25rem; font-weight: 700;">Your Safety Groups</h2>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <button id="join-group-btn" class="btn btn-red"><i data-lucide="plus-circle"></i><span>Join a Group</span></button>
                    <button id="create-group-btn" class="btn btn-blue"><i data-lucide="users"></i><span>Create a Group</span></button>
                </div>
                <div id="group-list-items" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>`;
            container.innerHTML = content;
            const listContainer = document.getElementById('group-list-items');
            if (!groupIds || groupIds.length === 0) {
                listContainer.innerHTML = `<div style="text-align: center; color: var(--text-secondary); padding: 2rem; border-radius: 0.75rem; background-color: white; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.07);"><p>You haven't joined any groups yet.</p></div>`;
            } else {
                 listContainer.innerHTML = ''; // Clear previous items
                 for (const groupId of groupIds) {
                    const groupSnap = await getDoc(doc(db, `artifacts/${appId}/public/data/groups`, groupId));
                    if (groupSnap.exists()) {
                        const group = groupSnap.data();
                        const el = document.createElement('div');
                        el.style = "padding: 1rem; background-color: white; border-radius: 0.75rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 4px 12px 0 rgb(0 0 0 / 0.07);";
                        el.innerHTML = `<div><p style="font-weight: 600;">${group.name}</p><p style="font-size: 0.75rem; color: var(--text-secondary);">${group.members.length} members</p></div><i data-lucide="chevron-right"></i>`;
                        el.onclick = () => { switchView('group-detail'); renderGroupDetail(groupId); }
                        listContainer.appendChild(el);
                    }
                 }
            }
            document.getElementById('join-group-btn').addEventListener('click', () => joinGroup());
            document.getElementById('create-group-btn').addEventListener('click', createGroup);
            lucide.createIcons();
        }
        async function renderGroupDetail(groupId) {
            const container = document.getElementById('group-detail-view');
            container.innerHTML = '<div class="loader"></div>'; 
            const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
            const groupSnap = await getDoc(groupRef);
            if (!groupSnap.exists()) return;
            const group = { id: groupSnap.id, ...groupSnap.data() };
            const memberStatuses = {};
            const updateUI = () => {
                let memberHtml = Object.values(memberStatuses).sort((a,b) => (a.name || '').localeCompare(b.name || '')).map(member => {
                    const isCurrentUser = member.id === userId;
                    let status = member.status || 'Unknown';
                    let statusColor = 'var(--text-secondary)';
                    let statusIcon = 'help-circle';
                    let timeText = member.lastUpdate ? formatTimeAgo(member.lastUpdate.toDate()) : 'Never';
                    if (member.status === 'Safe' && member.statusExpiresAt && member.statusExpiresAt.toDate() < new Date()) {
                        status = 'Unknown'; timeText = "Status expired";
                    }
                    if (status === 'Safe') {
                        statusColor = 'var(--brand-green)'; statusIcon = 'check-circle'; timeText = formatTimeRemaining(member.statusExpiresAt);
                    } else if (status === 'Needs Help') {
                        statusColor = 'var(--brand-red)'; statusIcon = 'alert-triangle';
                    }
                    const nameElement = isCurrentUser ? `<p style="font-weight: 500; cursor: pointer;" id="current-user-name" data-current-name="${member.name}">${member.name} (You)</p>` : `<p style="font-weight: 500;">${member.name}</p>`;
                    return `<div style="display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; background-color: white; box-shadow: 0 2px 4px 0 rgba(0,0,0,0.05); border-radius: 0.75rem;"><div style="display: flex; align-items: center; gap: 0.75rem;"><i data-lucide="${statusIcon}" style="color: ${statusColor};"></i><div>${nameElement}<p style="font-size: 0.75rem; color: var(--text-secondary);" id="timer-${member.id}">${timeText}</p></div></div><span style="font-size: 0.875rem; font-weight: 600; color: ${statusColor};">${status}</span></div>`;
                }).join('');
                container.innerHTML = `
                    <button id="back-to-groups-btn" style="align-self: flex-start; display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); background: none; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500;"><i data-lucide="arrow-left"></i><span>All Groups</span></button>
                    <h3 style="font-size: 1.25rem; font-weight: 700;">${group.name}</h3>
                    <div style="display: flex; gap: 0.5rem;"><button id="safe-btn" class="btn btn-green"><i data-lucide="shield-check"></i><span>I AM SAFE</span></button><button id="help-btn" class="btn btn-red"><i data-lucide="alert-circle"></i><span>I NEED HELP</span></button></div>
                    <div id="member-list" style="display: flex; flex-direction: column; gap: 0.5rem;">${memberHtml}</div>
                    <div style="text-align: center; padding: 1rem; margin-top: 1rem; border-top: 1px solid var(--border-color);"><p style="font-size: 0.75rem; color: var(--text-secondary);">Group Code:</p><p style="font-family: monospace; background-color: #f1f5f9; color: #475569; padding: 0.5rem; border-radius: 0.375rem; margin-top: 0.25rem;">${group.code}</p><button id="leave-group-btn" style="background:none; border:none; color:var(--brand-red); text-decoration: underline; cursor:pointer; margin-top: 1rem;">Leave Group</button></div>`;
                document.getElementById('back-to-groups-btn').addEventListener('click', () => switchView('groups'));
                document.getElementById('safe-btn').addEventListener('click', () => updateSafetyStatus('Safe'));
                document.getElementById('help-btn').addEventListener('click', () => updateSafetyStatus('Needs Help'));
                document.getElementById('leave-group-btn').addEventListener('click', () => confirmLeaveGroup(group.id, group.name));
                const currentUserNameEl = document.getElementById('current-user-name');
                if(currentUserNameEl) {
                    currentUserNameEl.addEventListener('dblclick', () => {
                        const currentName = currentUserNameEl.dataset.currentName;
                        const newName = prompt("Enter your new name:", currentName);
                        if (newName && newName.trim() !== '') {
                            updateUserName(newName.trim());
                        }
                    });
                }
                lucide.createIcons();
                 Object.values(memberStatuses).forEach(member => {
                    if (member.status === 'Safe' && member.statusExpiresAt) {
                        if (groupMemberTimers[member.id]) clearInterval(groupMemberTimers[member.id]);
                        groupMemberTimers[member.id] = setInterval(() => {
                            const timerEl = document.getElementById(`timer-${member.id}`);
                            if (timerEl) {
                                const remaining = formatTimeRemaining(member.statusExpiresAt);
                                timerEl.textContent = remaining;
                                if (remaining === "Expired") { clearInterval(groupMemberTimers[member.id]); }
                            } else { clearInterval(groupMemberTimers[member.id]); }
                        }, 60000);
                    }
                 });
            };
            clearAllListeners('groupMembers');
            group.members.forEach(memberId => {
                const memberRef = doc(db, `artifacts/${appId}/public/data/users`, memberId);
                listeners.groupMembers[memberId] = onSnapshot(memberRef, (docSnap) => {
                    if (docSnap.exists()) {
                        memberStatuses[memberId] = { id: memberId, ...docSnap.data() };
                        updateUI();
                    }
                });
            });
        }
        async function updateUserName(newName) {
            if (!userId || !newName) return;
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
            try { await updateDoc(userRef, { name: newName }); } catch(error) { console.error("Error updating user name:", error); }
        }
        function clearAllListeners(type) {
            if (type === 'groupMembers') {
                Object.values(listeners.groupMembers).forEach(unsub => unsub());
                listeners.groupMembers = {};
                Object.values(groupMemberTimers).forEach(timer => clearInterval(timer));
                groupMemberTimers = {};
            }
        }
        function initializeMap(){
            map = L.map('map').setView([12.8797, 121.7740], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd', minZoom: 0, maxZoom: 18
            }).addTo(map);
        }
        function getAlertStyles(severity){
            const styles = { Red: { color: 'var(--brand-red)', icon: 'shield-alert' }, Orange: { color: '#f97316', icon: 'siren' }, Yellow: { color: '#eab308', icon: 'alert-triangle' } };
            return styles[severity] || styles.Yellow;
        }
        function formatTimeAgo(date){
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "just now";
            const intervals = { 'year': 31536000, 'month': 2592000, 'day': 86400, 'hour': 3600, 'minute': 60 };
            for (let unit in intervals) {
                let interval = Math.floor(seconds / intervals[unit]);
                if (interval >= 1) { return interval + " " + unit + (interval > 1 ? 's' : '') + " ago"; }
            }
            return "just now";
        }
    </script>
</body>
