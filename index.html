        // NEW: Robust method to build the config object from meta tags
        function getFirebaseConfig() {
            return {
                apiKey: document.querySelector('meta[name="firebase-api-key"]').getAttribute('content'),
                authDomain: document.querySelector('meta[name="firebase-auth-domain"]').getAttribute('content'),

        async function initializeFirebase() {
            try {
                const firebaseConfig = getFirebaseConfig();

                // Check if placeholders were replaced
                if (!firebaseConfig.apiKey || firebaseConfig.apiKey.startsWith('__')) {
                    throw new Error("Firebase config placeholders not replaced. Check Cloudflare build settings.");
                }

                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("User is signed in with UID:", userId);
                        await setupUserDocument(userId);
                        attachUserGroupsListener(userId);
                        document.getElementById('loading-overlay').style.display = 'none';

        function initializeMapAndAlerts(){ mockAlerts.sort((a,b) => new Date(b.time) - new Date(a.time)); const alertList = document.getElementById('alert-list'); const map = L.map('map').setView([14.25, 121.1], 9); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>', subdomains: 'abcd', maxZoom: 20 }).addTo(map); renderAlerts(mockAlerts, alertList, map); }
        function checkNotificationPermission(){ if (Notification.permission === 'default') { document.getElementById('notification-banner').classList.remove('hidden'); document.getElementById('enable-notifications-btn').addEventListener('click', requestNotificationPermission); } }
        async function requestNotificationPermission(){ const permission = await Notification.requestPermission(); if(permission === 'granted') { document.getElementById('notification-banner').classList.add('hidden'); showNotification(mockAlerts[0]); } else { alert('You have disabled notifications.'); } }
        function showNotification(alert){ const { title, details, severity } = alert; const styles = getAlertStyles(severity); new Notification(`Bantay Alert: ${title}`, { body: details, icon: styles.iconUrl }); }
        function getAlertStyles(severity) { const styles = { Red: { color: 'red-500', icon: 'shield-alert', iconUrl: 'data:image/svg+xml,...' }, Orange: { color: 'orange-400', icon: 'siren', iconUrl: 'data:image/svg+xml,...' }, Yellow: { color: 'yellow-400', icon: 'alert-triangle', iconUrl: 'data:image/svg+xml,...' } }; return styles[severity] || styles.Yellow; }
        function renderAlerts(alerts, container, map){ container.innerHTML = ''; alerts.forEach(alert => { const { type, location, severity, title, source, time, details, lat, lon } = alert; const styles = getAlertStyles(severity); const alertEl = document.createElement('div'); alertEl.className = `p-4 rounded-lg border-l-4 bg-gray-800 border-${styles.color}`; alertEl.innerHTML = `<div class="flex items-start space-x-3"><div class="w-6 h-6 text-${styles.color}"><i data-lucide="${styles.icon}"></i></div><div><h3 class="font-semibold">${title}</h3><p class="text-sm text-gray-300">${details}</p><div class="text-xs text-gray-500 mt-2 flex items-center space-x-4"><span>${source}</span><span>${formatTimeAgo(new Date(time))}</span></div></div></div>`; container.appendChild(alertEl); const marker = L.circleMarker([lat, lon], { radius: 8, color: styles.color, fillColor: `#${styles.color === 'red-500' ? 'ef4444' : styles.color === 'orange-400' ? 'fb923c' : 'facc15'}`, fillOpacity: 0.7 }).addTo(map); marker.bindPopup(`<b>${title}</b><br>${location}`); }); lucide.createIcons(); }
        function formatTimeAgo(date) { const seconds = Math.floor((new Date() - date) / 1000); let interval = seconds / 31536000; if (interval > 1) return Math.floor(interval) + " years ago"; interval = seconds / 2592000; if (interval > 1) return Math.floor(interval) + " months ago"; interval = seconds / 86400; if (interval > 1) return Math.floor(interval) + " days ago"; interval = seconds / 3600; if (interval > 1) return Math.floor(interval) + " hours ago"; interval = seconds / 60; if (interval > 1) return Math.floor(interval) + " minutes ago"; return "just now"; }
        async function setupUserDocument(uid) { const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid); const userSnap = await getDoc(userRef); if (!userSnap.exists()) { const name = "Anonymous User"; await setDoc(userRef, { name: name, status: 'Unknown', lastUpdate: null, groups: [] }); } }
