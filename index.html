<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE ka ba? - Calamity Watch</title>
    
    <!-- Leaflet.js for the interactive map --><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Lucide Icons for clean, modern icons --><script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Embedded Tailwind-like styles for reliability */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --brand-blue: #1d4ed8; /* blue-700 */
            --brand-yellow: #fde047; /* yellow-300 */
            --brand-red: #ef4444; /* red-500 */
            --brand-red-dark: #dc2626; /* red-600 */
            --brand-green: #22c55e; /* green-500 */
            --brand-blue-light: #3b82f6; /* blue-500 */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9; /* slate-100 */
            color: #1e293b; /* slate-800 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior-y: none;
            margin: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 28rem; /* Equivalent to max-w-lg */
            margin: auto;
            background-color: #f8fafc; /* slate-50 */
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            position: relative;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 1rem;
            background-color: var(--brand-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            flex-shrink: 0;
            color: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--brand-yellow);
        }

        /* Map */
        #map { height: 35vh; z-index: 10; background-color: #e2e8f0; }

        /* Main Content */
        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            background-color: #f1f5f9; /* slate-100 */
        }
        
        /* Alerts */
        .alert-item {
            padding: 1rem;
            border-radius: 0.5rem;
            border-left-width: 4px;
            background-color: white;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: space-around;
            padding: 0.5rem;
            background-color: var(--brand-blue);
            flex-shrink: 0;
            z-index: 20;
            color: #bfdbfe; /* blue-200 */
        }
        .footer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 0.25rem;
        }
        .footer-btn.active { color: var(--brand-yellow); }
        .footer-btn span { font-size: 0.75rem; font-weight: 500; }

        /* Buttons */
        .btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: 600;
            color: white;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-red { background-color: var(--brand-red); }
        .btn-red:hover { background-color: var(--brand-red-dark); }
        .btn-blue { background-color: var(--brand-blue-light); }
        .btn-blue:hover { background-color: var(--brand-blue); }

        /* Utility */
        .hidden { display: none; }

        /* Loader */
        #loading-overlay { position: absolute; inset: 0; background-color: rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:50;}
        .loader {
            border: 4px solid #e2e8f0; /* slate-200 */
            border-top: 4px solid var(--brand-yellow);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="app">
        <!-- Loading Overlay --><div id="loading-overlay">
            <div class="loader"></div>
        </div>
        
        <!-- Header --><header>
            <h1>SAFE ka ba?</h1>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <span id="status-indicator" style="font-size: 0.75rem; font-weight: 600; color: #d1d5db;">● Connecting...</span>
                <i data-lucide="settings" style="width: 1.5rem; height: 1.5rem; color: #d1d5db;"></i>
            </div>
        </header>

        <!-- Main Content Area --><div id="main-content">
             <!-- ALERTS VIEW --><div id="alerts-view">
                <div id="map"></div>
                <div style="padding: 1rem; border-bottom: 1px solid #e2e8f0; border-top: 1px solid #e2e8f0; background-color: #f8fafc;">
                    <h2 id="warnings-title" style="font-weight: 600;">Active Warnings</h2>
                    <p id="warnings-subtitle" style="font-size: 0.75rem; color: #64748b;">Based on your location</p>
                </div>
                <main id="alert-list" style="padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;">
                    <!-- Alert items will be dynamically inserted here --></main>
            </div>

            <!-- GROUPS VIEW --><div id="groups-view" class="hidden" style="padding: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                <h2 style="font-size: 1.125rem; font-weight: 700;">Your Safety Groups</h2>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <button id="join-group-btn" class="btn btn-red">
                        <i data-lucide="plus-circle"></i>
                        <span>Join a Group</span>
                    </button>
                     <button id="create-group-btn" class="btn btn-blue">
                        <i data-lucide="users"></i>
                        <span>Create a Group</span>
                    </button>
                </div>
                <div id="group-list" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
            </div>
            
            <!-- GROUP DETAIL VIEW --><div id="group-detail-view" class="hidden" style="padding: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                <button id="back-to-groups-btn" style="display: flex; align-items: center; gap: 0.5rem; color: #64748b; background: none; border: none; cursor: pointer; font-size: 0.875rem;">
                    <i data-lucide="arrow-left"></i>
                    <span>All Groups</span>
                </button>
                <div id="group-detail-content"></div>
            </div>
        </div>

        <!-- Footer Navigation --><footer>
            <button id="alerts-btn" class="footer-btn active">
                <i data-lucide="shield-alert"></i>
                <span>Alerts</span>
            </button>
            <button id="groups-btn" class="footer-btn">
                <i data-lucide="users"></i>
                <span>Groups</span>
            </button>
        </footer>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, getDocs, onSnapshot, arrayUnion, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        let map;
        let app, auth, db, userId;
        const appId = 'bantay-pwa-live'; 
        let unsubscribeUserGroups = null; 
        let unsubscribeGroupMembers = {}; 
        let unsubscribeAlerts = null;
        let unsubscribeNationalAlerts = null;
        const firebaseConfigB64 = "__FIREBASE_CONFIG_B64__";

        function getAlertStyles(severity) {
            const styles = {
                Red: { color: '#ef4444', icon: 'shield-alert' },
                Orange: { color: '#f97316', icon: 'siren' },
                Yellow: { color: '#eab308', icon: 'alert-triangle' }
            };
            return styles[severity] || styles.Yellow;
        }

        function formatTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "just now";
            const intervals = { 'year': 31536000, 'month': 2592000, 'day': 86400, 'hour': 3600, 'minute': 60 };
            for (let unit in intervals) {
                let interval = Math.floor(seconds / intervals[unit]);
                if (interval >= 1) {
                    return interval + " " + unit + (interval > 1 ? 's' : '') + " ago";
                }
            }
            return "just now";
        }

        async function initializeFirebase() {
            if (!firebaseConfigB64 || firebaseConfigB64.startsWith('__')) {
                console.warn("Firebase config not found. Running in offline/demo mode.");
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('status-indicator').textContent = '● Offline';
                document.getElementById('status-indicator').style.color = '#e5e7eb';
                renderAlerts([], { fallbackType: 'offline' });
                return;
            }

            try {
                const firebaseConfig = JSON.parse(atob(firebaseConfigB64).trim());
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        document.getElementById('status-indicator').textContent = '● Live';
                        document.getElementById('status-indicator').style.color = '#4ade80';
                        await setupUserDocument(userId);
                        attachUserGroupsListener(userId);
                        attachAlertsListener();
                        document.getElementById('loading-overlay').style.display = 'none';
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                console.error("Firebase Initialization Error:", error);
                document.getElementById('loading-overlay').innerHTML = `<p style="color: red; text-align: center;">Firebase configuration error.<br>Please check deployment plan.</p>`;
            }
        }

        function attachAlertsListener() {
            if (unsubscribeAlerts) unsubscribeAlerts();
            if (unsubscribeNationalAlerts) unsubscribeNationalAlerts();

            const alertsCol = collection(db, `artifacts/${appId}/public/data/live-alerts`);
            unsubscribeAlerts = onSnapshot(alertsCol, (querySnapshot) => {
                const alerts = [];
                querySnapshot.forEach((doc) => alerts.push({ id: doc.id, ...doc.data() }));
                
                if (alerts.length > 0) {
                    renderAlerts(alerts);
                } else {
                    attachNationalAlertsListener();
                }
            });
        }

        function attachNationalAlertsListener() {
            const nationalAlertsCol = collection(db, `artifacts/${appId}/public/data/national-alerts`);
            const q = query(nationalAlertsCol, orderBy('severity', 'asc'), orderBy('time', 'desc'), limit(5));

            unsubscribeNationalAlerts = onSnapshot(q, (querySnapshot) => {
                const nationalAlerts = [];
                querySnapshot.forEach((doc) => nationalAlerts.push({ id: doc.id, ...doc.data() }));
                renderAlerts(nationalAlerts.length > 0 ? nationalAlerts : [], { fallbackType: nationalAlerts.length > 0 ? 'national' : 'all-clear' });
            }, (error) => {
                console.error("Firestore query error:", error);
                if (error.code === 'failed-precondition') {
                    // Friendly error for index creation
                }
            });
        }

        function initializeStaticUI() {
            document.getElementById('create-group-btn').addEventListener('click', createGroup);
            document.getElementById('join-group-btn').addEventListener('click', joinGroup);
            document.getElementById('back-to-groups-btn').addEventListener('click', () => switchView('groups'));
            document.getElementById('alerts-btn').addEventListener('click', () => switchView('alerts'));
            document.getElementById('groups-btn').addEventListener('click', () => switchView('groups'));
            initializeMap();
            lucide.createIcons();
        }

        function initializeMap(){
            map = L.map('map').setView([12.8797, 121.7740], 6);
            // Switched to CARTO's 'light_nolabels' for light theme with baby powder blue oceans
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd', minZoom: 0, maxZoom: 18
            }).addTo(map);
        }

        function renderAlerts(alerts, options = { fallbackType: 'none' }){
            const container = document.getElementById('alert-list');
            const titleEl = document.getElementById('warnings-title');
            const subtitleEl = document.getElementById('warnings-subtitle');
            container.innerHTML = '';
            
            if (map) map.eachLayer(layer => { if (layer instanceof L.CircleMarker) map.removeLayer(layer); });

            if (options.fallbackType === 'national') {
                titleEl.textContent = "Top National Alerts";
                subtitleEl.textContent = "Most critical warnings across the Philippines right now.";
            } else if (options.fallbackType === 'all-clear') {
                titleEl.textContent = "All Clear";
                subtitleEl.textContent = "No critical alerts reported nationwide.";
                container.innerHTML = `<div style="text-align: center; color: var(--brand-green); padding: 2rem; border-radius: 0.5rem; background-color: white; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center;"><i data-lucide="check-circle-2" style="width: 3rem; height: 3rem;"></i><p style="margin-top: 1rem; color: #374151;">The system is live and no severe threats are active.</p></div>`;
                lucide.createIcons();
                return;
            } else if (options.fallbackType === 'offline') {
                titleEl.textContent = "Offline Mode";
                subtitleEl.textContent = "Connect to the internet for live data.";
                 container.innerHTML = `<div style="text-align: center; color: #64748b; padding: 2rem; border-radius: 0.5rem; background-color: white; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);"><p>Cannot connect to live services.</p></div>`;
            } else {
                titleEl.textContent = "Active Warnings";
                subtitleEl.textContent = "Based on your location";
            }

            alerts.sort((a,b) => new Date(b.time) - new Date(a.time));

            alerts.forEach(alert => {
                const { severity, title, details, source, time, lat, lon, location } = alert;
                const styles = getAlertStyles(severity);
                const alertEl = document.createElement('div');
                alertEl.className = 'alert-item';
                alertEl.style.borderColor = styles.color;
                alertEl.innerHTML = `<div style="display:flex; align-items:flex-start; gap: 0.75rem;"><div style="width: 1.5rem; height: 1.5rem; color: ${styles.color}; flex-shrink: 0;"><i data-lucide="${styles.icon}"></i></div><div><h3 style="font-weight: 600; color: #0f172a;">${title} <span style="color: #64748b; font-weight: 400;">- ${location}</span></h3><p style="font-size: 0.875rem; color: #475569;">${details}</p><div style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem; display: flex; align-items: center; gap: 1rem;"><span>${source}</span><span>${formatTimeAgo(new Date(time))}</span></div></div></div>`;
                container.appendChild(alertEl);
                
                if (map) {
                    const marker = L.circleMarker([lat, lon], { radius: 8, color: styles.color, fillColor: styles.color, fillOpacity: 0.7 }).addTo(map);
                    marker.bindPopup(`<b>${title}</b><br>${location}`);
                }
            });
            lucide.createIcons();
        }

        function switchView(viewName) {
            const alertsView = document.getElementById('alerts-view');
            const groupsView = document.getElementById('groups-view');
            const groupDetailView = document.getElementById('group-detail-view');
            const alertsBtn = document.getElementById('alerts-btn');
            const groupsBtn = document.getElementById('groups-btn');

            alertsView.classList.add('hidden');
            groupsView.classList.add('hidden');
            groupDetailView.classList.add('hidden');
            alertsBtn.classList.remove('active');
            groupsBtn.classList.remove('active');

            if (viewName === 'alerts') {
                alertsView.classList.remove('hidden');
                alertsBtn.classList.add('active');
            } else if (viewName === 'groups') {
                groupsView.classList.remove('hidden');
                groupsBtn.classList.add('active');
            } else if (viewName === 'group-detail') {
                groupDetailView.classList.remove('hidden');
                groupsBtn.classList.add('active');
            }
        }

        async function createGroup() {
            if (!userId) return;
            const groupName = prompt("Enter a name for your new group:", "My Family");
            if (!groupName) return;
            const code = `${groupName.replace(/\s+/g, '-').toUpperCase()}-${Math.random().toString(36).substr(2, 4)}`;
            
            try {
                const groupDocRef = await addDoc(collection(db, `artifacts/${appId}/public/data/groups`), {
                    name: groupName, code: code, members: [userId]
                });
                await updateDoc(doc(db, `artifacts/${appId}/public/data/users`, userId), {
                    groups: arrayUnion(groupDocRef.id)
                });
                alert(`Group "${groupName}" created. Share code: ${code}`);
            } catch (error) { console.error("Error creating group:", error); alert("Could not create group."); }
        }

        async function joinGroup() {
            if (!userId) return;
            const code = prompt("Enter the group code to join:");
            if (!code) return;
            try {
                const q = query(collection(db, `artifacts/${appId}/public/data/groups`), where("code", "==", code));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) return alert("Group not found.");
                
                const groupDoc = querySnapshot.docs[0];
                await updateDoc(groupDoc.ref, { members: arrayUnion(userId) });
                await updateDoc(doc(db, `artifacts/${appId}/public/data/users`, userId), {
                    groups: arrayUnion(groupDoc.id)
                });
                alert(`Successfully joined "${groupDoc.data().name}".`);
            } catch (error) { console.error("Error joining group:", error); alert("Could not join group."); }
        }
        
        async function setupUserDocument(uid) {
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                const name = "User " + uid.substring(0, 5);
                await setDoc(userRef, { name: name, status: 'Unknown', lastUpdate: null, groups: [] });
            }
        }
        
        function attachUserGroupsListener(uid) {
            if (unsubscribeUserGroups) unsubscribeUserGroups();
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            unsubscribeUserGroups = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) renderGroupList(docSnap.data().groups || []);
            });
        }
        
        async function renderGroupList(groupIds) {
            const container = document.getElementById('group-list');
            container.innerHTML = '';
            if (groupIds.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: #64748b; padding: 2rem; border-radius: 0.5rem; background-color: #f1f5f9;"><p>You haven't joined any groups yet.</p></div>`;
                return;
            }
            for (const groupId of groupIds) {
                const groupSnap = await getDoc(doc(db, `artifacts/${appId}/public/data/groups`, groupId));
                if (groupSnap.exists()) {
                    const group = groupSnap.data();
                    const el = document.createElement('div');
                    el.style = "padding: 1rem; background-color: white; border-radius: 0.5rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);";
                    el.innerHTML = `<div><p style="font-weight: 600;">${group.name}</p><p style="font-size: 0.75rem; color: #64748b;">${group.members.length} members</p></div><i data-lucide="chevron-right"></i>`;
                    el.onclick = () => {
                        switchView('group-detail');
                        renderGroupDetail(groupId);
                    }
                    container.appendChild(el);
                }
            }
            lucide.createIcons();
        }

        async function renderGroupDetail(groupId) {
             const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
            const groupSnap = await getDoc(groupRef);
            if (!groupSnap.exists()) return;
            const group = groupSnap.data();

            const container = document.getElementById('group-detail-content');
            const memberStatuses = {};

            const updateUI = () => {
                let memberHtml = Object.values(memberStatuses).sort((a,b) => a.name.localeCompare(b.name)).map(member => {
                    const isSafe = member.status === 'Safe';
                    const statusColor = isSafe ? 'var(--brand-green)' : 'var(--brand-yellow)';
                    const timeAgo = member.lastUpdate ? formatTimeAgo(member.lastUpdate.toDate()) : 'Never';
                    return `<div style="display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; background-color: white; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); border-radius: 0.5rem;"><div style="display: flex; align-items: center; gap: 0.75rem;"><i data-lucide="${isSafe ? 'check-circle' : 'alert-circle'}" style="color: ${statusColor};"></i><div><p style="font-weight: 500;">${member.name} ${member.id === userId ? '(You)' : ''}</p><p style="font-size: 0.75rem; color: #64748b;">Last update: ${timeAgo}</p></div></div><span style="font-size: 0.875rem; font-weight: 600; color: ${statusColor};">${member.status || 'Unknown'}</span></div>`;
                }).join('');
                container.innerHTML = `<div style="display: flex; flex-direction: column; gap: 1rem;"><h3 style="font-size: 1.25rem; font-weight: 700;">${group.name}</h3><button id="mark-safe-btn" class="btn" style="background-color: var(--brand-green);"><i data-lucide="shield-check"></i><span>Mark Myself as Safe</span></button><div style="display: flex; flex-direction: column; gap: 0.5rem;">${memberHtml}</div><div style="text-align: center; padding: 1rem; margin-top: 1rem; border-top: 1px solid #e2e8f0;"><p style="font-size: 0.75rem; color: #94a3b8;">Group Code:</p><p style="font-family: monospace; background-color: #f1f5f9; color: #475569; padding: 0.5rem; border-radius: 0.375rem; margin-top: 0.25rem;">${group.code}</p></div></div>`;
                lucide.createIcons();
                document.getElementById('mark-safe-btn').addEventListener('click', markAsSafe);
            };

            group.members.forEach(memberId => {
                const memberRef = doc(db, `artifacts/${appId}/public/data/users`, memberId);
                unsubscribeGroupMembers[memberId] = onSnapshot(memberRef, (docSnap) => {
                    if (docSnap.exists()) {
                        memberStatuses[memberId] = { id: memberId, ...docSnap.data() };
                        updateUI();
                    }
                });
            });
        }
        
        async function markAsSafe() {
            if (!userId) return;
            try {
                await updateDoc(doc(db, `artifacts/${appId}/public/data/users`, userId), {
                    status: 'Safe', lastUpdate: serverTimestamp()
                });
                alert("Your status has been updated to 'Safe'.");
            } catch (error) { console.error("Error updating status:", error); alert("Could not update status."); }
        }


        document.addEventListener('DOMContentLoaded', () => {
            initializeStaticUI();
            initializeFirebase();
        });
    </script>
</body>
</html>
