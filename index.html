<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bantay - Calamity Watch</title>
    
    <!-- Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet.js for the interactive map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha2-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha2-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Lucide Icons for clean, modern icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior-y: none; /* Prevents pull-to-refresh */
        }
        #map { height: 35vh; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        @keyframes slideInDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .slide-in-down { animation: slideInDown 0.5s ease-out forwards; }
        
        .footer-btn.active { color: #3b82f6; } /* blue-500 */

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3; /* Light grey */
            border-top: 4px solid #3b82f6; /* Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white antialiased">

    <div id="app" class="flex flex-col h-screen max-w-lg mx-auto bg-gray-800 shadow-2xl relative overflow-hidden">
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="absolute inset-0 bg-gray-900/80 flex justify-center items-center z-50">
            <div class="loader"></div>
        </div>

        <!-- Notification Permission Banner -->
        <div id="notification-banner" class="hidden absolute top-0 left-0 right-0 z-40 p-4 bg-blue-600 shadow-lg text-center slide-in-down">
            <p class="text-sm font-medium">Get live alerts for your area.</p>
            <button id="enable-notifications-btn" class="mt-2 px-4 py-1 bg-white text-blue-700 font-semibold rounded-md text-xs">Enable Notifications</button>
        </div>

        <!-- Header -->
        <header class="p-4 bg-gray-900 border-b border-gray-700 flex justify-between items-center z-20 shrink-0">
            <h1 class="text-xl font-bold tracking-tight">Bantay</h1>
            <div class="flex items-center space-x-2">
                <span class="text-xs text-green-400 font-semibold">● Live</span>
                <div class="w-6 h-6 text-gray-400"><i data-lucide="settings"></i></div>
            </div>
        </header>

        <!-- Main Content Area (Swappable Views) -->
        <div id="main-content" class="flex-1 overflow-y-auto">
             <!-- ALERTS VIEW -->
             <div id="alerts-view">
                <div id="map" class="w-full bg-gray-700 z-0"></div>
                <div class="p-4 border-b border-t border-gray-700 bg-gray-900 z-10">
                    <h2 class="font-semibold">Active Warnings</h2>
                    <p class="text-xs text-gray-400">Based on your location: Santa Rosa, Calabarzon</p>
                </div>
                <main id="alert-list" class="p-4 space-y-3 custom-scrollbar z-10">
                    <!-- Alert items will be dynamically inserted here -->
                </main>
            </div>

            <!-- GROUPS VIEW -->
            <div id="groups-view" class="hidden h-full p-4 space-y-4 custom-scrollbar">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold">Your Safety Groups</h2>
                </div>
                
                <div class="space-y-2">
                    <button id="join-group-btn" class="w-full flex items-center justify-center space-x-2 p-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition-colors">
                        <i data-lucide="plus-circle"></i>
                        <span>Join a Group</span>
                    </button>
                     <button id="create-group-btn" class="w-full flex items-center justify-center space-x-2 p-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-semibold transition-colors">
                        <i data-lucide="users"></i>
                        <span>Create a Group</span>
                    </button>
                </div>
                
                <div id="group-list" class="space-y-3">
                    <!-- Group list items will be dynamically inserted here -->
                </div>
            </div>

             <!-- GROUP DETAIL VIEW -->
            <div id="group-detail-view" class="hidden h-full p-4 space-y-4 custom-scrollbar">
                <button id="back-to-groups-btn" class="flex items-center space-x-2 text-gray-400 hover:text-white">
                    <i data-lucide="arrow-left"></i>
                    <span class="text-sm">All Groups</span>
                </button>
                <div id="group-detail-content">
                    <!-- Group member statuses will be dynamically inserted here -->
                </div>
            </div>
        </div>

        <!-- Footer Navigation -->
        <footer class="flex justify-around p-2 bg-gray-900 border-t border-gray-700 shrink-0 z-20">
            <button id="alerts-btn" class="footer-btn flex flex-col items-center space-y-1 text-gray-400 active">
                <i data-lucide="shield-alert"></i>
                <span class="text-xs font-medium">Alerts</span>
            </button>
            <button id="groups-btn" class="footer-btn flex flex-col items-center space-y-1 text-gray-400">
                <i data-lucide="users"></i>
                <span class="text-xs font-medium">Groups</span>
            </button>
        </footer>
    </div>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, getDocs, onSnapshot, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // --- MOCK DATA ---
        const mockAlerts = [{"type":"Flood","location":"Santa Rosa, Laguna","severity":"Red","title":"Severe Flood Warning","source":"MDRRMO","time":"2025-10-12T09:15:00Z","details":"Red Warning: Life-threatening flooding is imminent in low-lying areas. Evacuate immediately.","lat":14.31,"lon":121.11},{"type":"Typhoon","location":"CALABARZON","severity":"Red","title":"Typhoon Signal No. 3 Raised","source":"PAGASA","time":"2025-10-12T08:00:00Z","details":"Typhoon \"Karding\" is expected to bring intense rainfall and destructive winds to the region. Evacuate low-lying areas.","lat":14.22,"lon":121.1},{"type":"Flood","location":"Santa Rosa, Laguna","severity":"Orange","title":"Heavy Rainfall Warning","source":"PAGASA","time":"2025-10-12T09:05:00Z","details":"Orange Warning: Intense rain (15-30mm/hr) expected over the next hour. Flooding is threatening.","lat":14.31,"lon":121.11},{"type":"Earthquake","location":"22km N of Taal, Batangas","severity":"Yellow","title":"Magnitude 4.2 Earthquake","source":"PHIVOLCS","time":"2025-10-11T21:30:00Z","details":"Tectonic in origin. Aftershocks are possible. No destructive tsunami threat.","lat":14.1,"lon":121.0}];
        
        // --- FIREBASE SETUP ---
        let app, auth, db, userId;
        let unsubscribeUserGroups = null; // To detach listeners
        let unsubscribeGroupMembers = {}; 

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};

        async function initializeFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("User is signed in with UID:", userId);
                        await setupUserDocument(userId);
                        attachUserGroupsListener(userId);
                        document.getElementById('loading-overlay').style.display = 'none';
                    } else {
                        console.log("No user signed in, attempting anonymous sign in.");
                        if (typeof __initial_auth_token !== 'undefined') {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    }
                });
            } catch (error) {
                console.error("Firebase Initialization Error:", error);
                document.getElementById('loading-overlay').innerHTML = `<p class="text-red-400 text-center">Failed to connect to Bantay services.<br>Please refresh.</p>`;
            }
        }

        async function setupUserDocument(uid) {
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                const name = prompt("Welcome to Bantay! What should we call you?", "Anonymous User");
                await setDoc(userRef, {
                    name: name || "Anonymous User",
                    status: 'Unknown',
                    lastUpdate: null,
                    groups: []
                });
            }
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            initializeFirebase();
            initializeStaticUI();
        });

        function initializeStaticUI() {
            const alertsBtn = document.getElementById('alerts-btn');
            const groupsBtn = document.getElementById('groups-btn');

            initializeMapAndAlerts();
            checkNotificationPermission();
            lucide.createIcons();
            
            alertsBtn.addEventListener('click', () => switchView('alerts'));
            groupsBtn.addEventListener('click', () => switchView('groups'));

            document.getElementById('create-group-btn').addEventListener('click', createGroup);
            document.getElementById('join-group-btn').addEventListener('click', joinGroup);
            document.getElementById('back-to-groups-btn').addEventListener('click', () => switchView('groups'));
        }

        // --- VIEW SWITCHING LOGIC ---
        function switchView(viewName, context = null) {
            document.getElementById('alerts-view').classList.add('hidden');
            document.getElementById('groups-view').classList.add('hidden');
            document.getElementById('group-detail-view').classList.add('hidden');
            document.getElementById('alerts-btn').classList.remove('active');
            document.getElementById('groups-btn').classList.remove('active');
            
            // Detach all group member listeners when switching views
            Object.values(unsubscribeGroupMembers).forEach(unsub => unsub());
            unsubscribeGroupMembers = {};

            if (viewName === 'alerts') {
                document.getElementById('alerts-view').classList.remove('hidden');
                document.getElementById('alerts-btn').classList.add('active');
            } else if (viewName === 'groups') {
                document.getElementById('groups-view').classList.remove('hidden');
                document.getElementById('groups-btn').classList.add('active');
            } else if (viewName === 'group-detail' && context) {
                document.getElementById('group-detail-view').classList.remove('hidden');
                document.getElementById('groups-btn').classList.add('active');
                renderGroupDetail(context); // context is groupId
            }
        }

        // --- FIREBASE GROUP MANAGEMENT LOGIC ---
        async function createGroup() {
            if (!userId) return alert("Please wait, connecting to service.");
            const groupName = prompt("Enter a name for your new group:", "My Family");
            if (!groupName) return;

            const code = `${groupName.replace(/\s+/g, '-').toUpperCase()}-${Math.random().toString(36).substr(2, 4)}`;
            
            try {
                const groupsCol = collection(db, `artifacts/${appId}/public/data/groups`);
                const groupDocRef = await addDoc(groupsCol, {
                    name: groupName,
                    code: code,
                    members: [userId]
                });
                
                const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
                await updateDoc(userRef, {
                    groups: arrayUnion(groupDocRef.id)
                });

                alert(`Group "${groupName}" created. Share this code with others to join: ${code}`);
            } catch (error) {
                console.error("Error creating group:", error);
                alert("Could not create the group. Please try again.");
            }
        }

        async function joinGroup() {
            if (!userId) return alert("Please wait, connecting to service.");
            const code = prompt("Enter the group code to join:");
            if (!code) return;

            try {
                const groupsCol = collection(db, `artifacts/${appId}/public/data/groups`);
                const q = query(groupsCol, where("code", "==", code));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    return alert("Group not found. Please check the code.");
                }

                const groupDoc = querySnapshot.docs[0];
                const groupId = groupDoc.id;
                const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
                
                // Add user to group members
                await updateDoc(groupRef, {
                    members: arrayUnion(userId)
                });
                
                // Add group to user's groups list
                const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
                await updateDoc(userRef, {
                    groups: arrayUnion(groupId)
                });

                alert(`Successfully joined "${groupDoc.data().name}".`);
            } catch (error) {
                console.error("Error joining group:", error);
                alert("Could not join the group. Please try again.");
            }
        }

        async function markAsSafe(groupId) {
             if (!userId) return alert("Please wait, connecting to service.");
             const userRef = doc(db, `artifacts/${appId}/public/data/users`, userId);
             try {
                await updateDoc(userRef, {
                    status: 'Safe',
                    lastUpdate: serverTimestamp()
                });
             } catch (error) {
                console.error("Error updating status:", error);
                alert("Could not update status. Please try again.");
             }
        }

        // --- FIREBASE REAL-TIME RENDERING ---
        function attachUserGroupsListener(uid) {
            if (unsubscribeUserGroups) unsubscribeUserGroups(); // Detach old listener
            
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            unsubscribeUserGroups = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    renderGroupList(docSnap.data().groups || []);
                }
            });
        }
        
        async function renderGroupList(groupIds) {
            const container = document.getElementById('group-list');
            container.innerHTML = '';
            
            if (groupIds.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 p-8 rounded-lg bg-gray-700/50"><p>You haven't joined any groups yet.</p><p class="text-xs mt-2">Create a group or join one to see the safety status of your family or team.</p></div>`;
                return;
            }

            for (const groupId of groupIds) {
                const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
                const groupSnap = await getDoc(groupRef);
                if (groupSnap.exists()) {
                    const group = groupSnap.data();
                    const element = document.createElement('div');
                    element.className = 'p-4 bg-gray-700 rounded-lg flex justify-between items-center cursor-pointer hover:bg-gray-600';
                    element.innerHTML = `<div><p class="font-semibold">${group.name}</p><p class="text-xs text-gray-400">${group.members.length} members</p></div><i data-lucide="chevron-right"></i>`;
                    element.onclick = () => switchView('group-detail', groupId);
                    container.appendChild(element);
                }
            }
            lucide.createIcons();
        }
        
        async function renderGroupDetail(groupId) {
            const groupRef = doc(db, `artifacts/${appId}/public/data/groups`, groupId);
            const groupSnap = await getDoc(groupRef);
            if (!groupSnap.exists()) return;
            const group = groupSnap.data();

            const container = document.getElementById('group-detail-content');
            
            const memberStatuses = {}; // Object to hold member data

            const updateUI = () => {
                let memberHtml = Object.values(memberStatuses).map(member => {
                    const isSafe = member.status === 'Safe';
                    const statusColor = isSafe ? 'text-green-400' : 'text-yellow-400';
                    const statusIcon = isSafe ? 'check-circle' : 'alert-circle';
                    const timeAgo = member.lastUpdate ? formatTimeAgo(member.lastUpdate.toDate()) : 'Never';
                    
                    return `<div class="flex items-center justify-between p-3 bg-gray-700 rounded-lg"><div class="flex items-center space-x-3"><i data-lucide="${statusIcon}" class="${statusColor}"></i><div><p class="font-medium">${member.name} ${member.id === userId ? '(You)' : ''}</p><p class="text-xs text-gray-400">Last update: ${timeAgo}</p></div></div><span class="text-sm font-semibold ${statusColor}">${member.status}</span></div>`;
                }).join('');

                container.innerHTML = `<div class="space-y-4"><h3 class="text-xl font-bold">${group.name}</h3><button onclick="markAsSafe('${groupId}')" class="w-full flex items-center justify-center space-x-2 p-3 bg-green-600 hover:bg-green-700 rounded-lg font-bold text-lg transition-colors"><i data-lucide="shield-check"></i><span>Mark Myself as Safe</span></button><div class="space-y-2">${memberHtml}</div><div class="text-center p-4 mt-4 border-t border-gray-700"><p class="text-xs text-gray-500">Group Code (Share with others):</p><p class="font-mono bg-gray-900 p-2 rounded-md mt-1 text-center">${group.code}</p></div></div>`;
                lucide.createIcons();
            };

            // Set up listeners for each member
            group.members.forEach(memberId => {
                const memberRef = doc(db, `artifacts/${appId}/public/data/users`, memberId);
                unsubscribeGroupMembers[memberId] = onSnapshot(memberRef, (docSnap) => {
                    if (docSnap.exists()) {
                        memberStatuses[memberId] = { id: memberId, ...docSnap.data() };
                        updateUI();
                    }
                });
            });
        }

        // --- HELPER & STATIC UI FUNCTIONS ---
        function initializeMapAndAlerts(){ /* ... same as before ... */ }
        function checkNotificationPermission(){ /* ... same as before ... */ }
        function requestNotificationPermission(){ /* ... same as before ... */ }
        function showNotification(alert){ /* ... same as before ... */ }
        function getAlertStyles(severity){ /* ... same as before ... */ }
        function renderAlerts(alerts, container, map){ /* ... same as before ... */ }
        function formatTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return "just now";
        }
    </script>
</body>
</html>
