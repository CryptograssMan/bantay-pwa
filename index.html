<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bantay - Calamity Watch</title>
    
    <!-- Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet.js for the interactive map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Lucide Icons for clean, modern icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ... styles remain the same ... */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior-y: none; /* Prevents pull-to-refresh */
        }
        #map { height: 35vh; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        @keyframes slideInDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .slide-in-down { animation: slideInDown 0.5s ease-out forwards; }
        
        .footer-btn.active { color: #3b82f6; } /* blue-500 */

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3; /* Light grey */
            border-top: 4px solid #3b82f6; /* Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white antialiased">

    <div id="app" class="flex flex-col h-screen max-w-lg mx-auto bg-gray-800 shadow-2xl relative overflow-hidden">
        <!-- ... HTML body remains the same ... -->
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="absolute inset-0 bg-gray-900/80 flex justify-center items-center z-50">
            <div class="loader"></div>
        </div>

        <!-- Notification Permission Banner -->
        <div id="notification-banner" class="hidden absolute top-0 left-0 right-0 z-40 p-4 bg-blue-600 shadow-lg text-center slide-in-down">
            <p class="text-sm font-medium">Get live alerts for your area.</p>
            <button id="enable-notifications-btn" class="mt-2 px-4 py-1 bg-white text-blue-700 font-semibold rounded-md text-xs">Enable Notifications</button>
        </div>

        <!-- Header -->
        <header class="p-4 bg-gray-900 border-b border-gray-700 flex justify-between items-center z-20 shrink-0">
            <h1 class="text-xl font-bold tracking-tight">Bantay</h1>
            <div class="flex items-center space-x-2">
                <span id="status-indicator" class="text-xs text-yellow-400 font-semibold">● Connecting...</span>
                <div class="w-6 h-6 text-gray-400"><i data-lucide="settings"></i></div>
            </div>
        </header>

        <!-- Main Content Area (Swappable Views) -->
        <div id="main-content" class="flex-1 overflow-y-auto">
             <!-- ALERTS VIEW -->
             <div id="alerts-view">
                <div id="map" class="w-full bg-gray-700 z-0"></div>
                <div class="p-4 border-b border-t border-gray-700 bg-gray-900 z-10">
                    <h2 class="font-semibold">Active Warnings</h2>
                    <p class="text-xs text-gray-400">Based on your location: Santa Rosa, Calabarzon</p>
                </div>
                <main id="alert-list" class="p-4 space-y-3 custom-scrollbar z-10">
                    <!-- Alert items will be dynamically inserted here -->
                </main>
            </div>

            <!-- GROUPS VIEW -->
            <div id="groups-view" class="hidden h-full p-4 space-y-4 custom-scrollbar">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold">Your Safety Groups</h2>
                </div>
                
                <div class="space-y-2">
                    <button id="join-group-btn" class="w-full flex items-center justify-center space-x-2 p-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition-colors">
                        <i data-lucide="plus-circle"></i>
                        <span>Join a Group</span>
                    </button>
                     <button id="create-group-btn" class="w-full flex items-center justify-center space-x-2 p-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-semibold transition-colors">
                        <i data-lucide="users"></i>
                        <span>Create a Group</span>
                    </button>
                </div>
                
                <div id="group-list" class="space-y-3">
                    <!-- Group list items will be dynamically inserted here -->
                </div>
            </div>

             <!-- GROUP DETAIL VIEW -->
            <div id="group-detail-view" class="hidden h-full p-4 space-y-4 custom-scrollbar">
                <button id="back-to-groups-btn" class="flex items-center space-x-2 text-gray-400 hover:text-white">
                    <i data-lucide="arrow-left"></i>
                    <span class="text-sm">All Groups</span>
                </button>
                <div id="group-detail-content">
                    <!-- Group member statuses will be dynamically inserted here -->
                </div>
            </div>
        </div>

        <!-- Footer Navigation -->
        <footer class="flex justify-around p-2 bg-gray-900 border-t border-gray-700 shrink-0 z-20">
            <button id="alerts-btn" class="footer-btn flex flex-col items-center space-y-1 text-gray-400 active">
                <i data-lucide="shield-alert"></i>
                <span class="text-xs font-medium">Alerts</span>
            </button>
            <button id="groups-btn" class="footer-btn flex flex-col items-center space-y-1 text-gray-400">
                <i data-lucide="users"></i>
                <span class="text-xs font-medium">Groups</span>
            </button>
        </footer>
    </div>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, getDocs, onSnapshot, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firestore.js";

        // --- MOCK DATA (FALLBACK) ---
        const mockAlerts = [{"type":"Flood","location":"Santa Rosa, Laguna","severity":"Red","title":"Severe Flood Warning","source":"MDRRMO","time":"2025-10-12T09:15:00Z","details":"Red Warning: Life-threatening flooding is imminent in low-lying areas. Evacuate immediately.","lat":14.31,"lon":121.11},{"type":"Typhoon","location":"CALABARZON","severity":"Red","title":"Typhoon Signal No. 3 Raised","source":"PAGASA","time":"2025-10-12T08:00:00Z","details":"Typhoon \"Karding\" is expected to bring intense rainfall and destructive winds to the region. Evacuate low-lying areas.","lat":14.22,"lon":121.1},{"type":"Flood","location":"Santa Rosa, Laguna","severity":"Orange","title":"Heavy Rainfall Warning","source":"PAGASA","time":"2025-10-12T09:05:00Z","details":"Orange Warning: Intense rain (15-30mm/hr) expected over the next hour. Flooding is threatening.","lat":14.31,"lon":121.11},{"type":"Earthquake","location":"22km N of Taal, Batangas","severity":"Yellow","title":"Magnitude 4.2 Earthquake","source":"PHIVOLCS","time":"2025-10-11T21:30:00Z","details":"Tectonic in origin. Aftershocks are possible. No destructive tsunami threat.","lat":14.1,"lon":121.0}];
        
        // --- GLOBAL STATE & SETUP ---
        let app, auth, db, userId;
        const appId = 'bantay-pwa-live'; 
        let unsubscribeUserGroups = null; 
        let unsubscribeGroupMembers = {}; 
        let unsubscribeAlerts = null;
        let map; // Make map a global variable
        const firebaseConfigB64 = "__FIREBASE_CONFIG_B64__";

        // --- HELPER FUNCTIONS ---
        function getAlertStyles(severity) {
            const styles = {
                Red: { color: 'red-500', icon: 'shield-alert' },
                Orange: { color: 'orange-400', icon: 'siren' },
                Yellow: { color: 'yellow-400', icon: 'alert-triangle' }
            };
            const style = styles[severity];
            if (style) {
                return style;
            }
            // Fallback for unknown severity levels
            return styles.Yellow;
        }

        function formatTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return "just now";
        }

        async function initializeFirebase() {
            if (!firebaseConfigB64 || firebaseConfigB64.startsWith('__')) {
                console.warn("Firebase config not found. Running in offline/demo mode.");
                document.getElementById('loading-overlay').style.display = 'none';
                const statusIndicator = document.getElementById('status-indicator');
                statusIndicator.textContent = '● Offline';
                statusIndicator.className = 'text-xs text-yellow-400 font-semibold';
                renderAlerts(mockAlerts); // Render mock data in offline mode
                return;
            }

            let decodedConfig;
            try { decodedConfig = atob(firebaseConfigB64); } 
            catch (e) { /* ... error handling ... */ return; }

            const cleanedConfig = decodedConfig.trim();

            try {
                const firebaseConfig = JSON.parse(cleanedConfig);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("User is signed in with UID:", userId);
                        const statusIndicator = document.getElementById('status-indicator');
                        statusIndicator.textContent = '● Live';
                        statusIndicator.className = 'text-xs text-green-400 font-semibold';

                        await setupUserDocument(userId);
                        attachUserGroupsListener(userId);
                        attachAlertsListener(); // Attach live alerts listener
                        document.getElementById('loading-overlay').style.display = 'none';
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                /* ... error handling ... */
            }
        }
        
        // --- REAL-TIME ALERTS ---
        function attachAlertsListener() {
            if (unsubscribeAlerts) unsubscribeAlerts();
            const alertsCol = collection(db, `artifacts/${appId}/public/data/live-alerts`);
            unsubscribeAlerts = onSnapshot(alertsCol, (querySnapshot) => {
                const alerts = [];
                querySnapshot.forEach((doc) => {
                    alerts.push({ id: doc.id, ...doc.data() });
                });
                if (alerts.length > 0) {
                    renderAlerts(alerts);
                } else {
                    // If no live alerts, show a message or fallback to mock
                    renderAlerts(mockAlerts, true); // Pass a flag to indicate it's fallback
                }
            });
        }
        
        // --- UI INITIALIZATION & RENDERING ---
        function initializeStaticUI() {
            const alertsBtn = document.getElementById('alerts-btn');
            const groupsBtn = document.getElementById('groups-btn');

            initializeMap(); // Only initialize the map here
            checkNotificationPermission();
            lucide.createIcons();
            
            alertsBtn.addEventListener('click', () => switchView('alerts'));
            groupsBtn.addEventListener('click', () => switchView('groups'));

            document.getElementById('create-group-btn').addEventListener('click', createGroup);
            document.getElementById('join-group-btn').addEventListener('click', joinGroup);
            document.getElementById('back-to-groups-btn').addEventListener('click', () => switchView('groups'));
        }

        function initializeMap(){
            map = L.map('map').setView([14.25, 121.1], 9);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        function renderAlerts(alerts, isFallback = false){
            const container = document.getElementById('alert-list');
            container.innerHTML = '';
            
            // Clear previous markers
            if (map) {
                map.eachLayer((layer) => {
                    if (layer instanceof L.CircleMarker) {
                        map.removeLayer(layer);
                    }
                });
            }

            alerts.sort((a,b) => new Date(b.time) - new Date(a.time));

            if (isFallback) {
                 const fallbackEl = document.createElement('div');
                 fallbackEl.className = 'text-center text-gray-400 p-8 rounded-lg bg-gray-700/50';
                 fallbackEl.innerHTML = `<p>No active alerts from live feed.</p><p class="text-xs mt-2">Showing recent examples.</p>`;
                 container.appendChild(fallbackEl);
            }

            alerts.forEach(alert => {
                const { severity, title, details, source, time, lat, lon, location } = alert;
                const styles = getAlertStyles(severity);
                const alertEl = document.createElement('div');
                alertEl.className = `p-4 rounded-lg border-l-4 bg-gray-800 border-${styles.color}`;
                alertEl.innerHTML = `<div class="flex items-start space-x-3"><div class="w-6 h-6 text-${styles.color} shrink-0"><i data-lucide="${styles.icon}"></i></div><div><h3 class="font-semibold">${title}</h3><p class="text-sm text-gray-300">${details}</p><div class="text-xs text-gray-500 mt-2 flex items-center space-x-4"><span>${source}</span><span>${formatTimeAgo(new Date(time))}</span></div></div></div>`;
                container.appendChild(alertEl);
                
                if (map) {
                    const markerColor = styles.color.split('-')[0];
                    const marker = L.circleMarker([lat, lon], { radius: 8, color: markerColor, fillColor: markerColor, fillOpacity: 0.7 }).addTo(map);
                    marker.bindPopup(`<b>${title}</b><br>${location}`);
                }
            });
            lucide.createIcons();
        }

        // --- OTHER FUNCTIONS (GROUPS, UTILS, ETC.) ---
        function switchView(viewName, context = null) { 
            document.getElementById('alerts-view').classList.add('hidden');
            document.getElementById('groups-view').classList.add('hidden');
            document.getElementById('group-detail-view').classList.add('hidden');
            document.getElementById('alerts-btn').classList.remove('active');
            document.getElementById('groups-btn').classList.remove('active');
            
            Object.values(unsubscribeGroupMembers).forEach(unsub => unsub());
            unsubscribeGroupMembers = {};

            if (viewName === 'alerts') {
                document.getElementById('alerts-view').classList.remove('hidden');
                document.getElementById('alerts-btn').classList.add('active');
            } else if (viewName === 'groups') {
                document.getElementById('groups-view').classList.remove('hidden');
                document.getElementById('groups-btn').classList.add('active');
            } else if (viewName === 'group-detail' && context) {
                document.getElementById('group-detail-view').classList.remove('hidden');
                document.getElementById('groups-btn').classList.add('active');
                renderGroupDetail(context); 
            }
         }
        async function createGroup() { if (!userId) { alert("Connecting to service, please try again shortly."); return; } /* ... function body ... */ }
        async function joinGroup() { if (!userId) { alert("Connecting to service, please try again shortly."); return; } /* ... function body ... */ }
        async function markAsSafe(groupId) { if (!userId) return; /* ... function body ... */ }
        function attachUserGroupsListener(uid) { 
            if (unsubscribeUserGroups) unsubscribeUserGroups();
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            unsubscribeUserGroups = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    renderGroupList(docSnap.data().groups || []);
                }
            });
         }
        async function renderGroupList(groupIds) { /* ... function body ... */ }
        async function renderGroupDetail(groupId) { /* ... function body ... */ }
        async function setupUserDocument(uid) { 
            const userRef = doc(db, `artifacts/${appId}/public/data/users`, uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                const name = "Anonymous User";
                await setDoc(userRef, {
                    name: name,
                    status: 'Unknown',
                    lastUpdate: null,
                    groups: []
                });
            }
         }
        function checkNotificationPermission(){
            if ('Notification' in window && Notification.permission === 'default') {
                document.getElementById('notification-banner').classList.remove('hidden');
                document.getElementById('enable-notifications-btn').addEventListener('click', requestNotificationPermission);
            }
         }
        async function requestNotificationPermission(){
            const permission = await Notification.requestPermission();
            if(permission === 'granted') {
                document.getElementById('notification-banner').classList.add('hidden');
                showNotification(mockAlerts[0]);
            }
         }
        function showNotification(alert){
            const { title, details } = alert;
            new Notification(`Bantay Alert: ${title}`, { body: details });
         }
        
        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            initializeStaticUI();
            initializeFirebase();
        });
    </script>
</body>
</html>
